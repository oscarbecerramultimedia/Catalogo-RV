<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj de Ctrl Persl y Corr</title>

<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================
   EL LIENZO PRINCIPAL
   ========================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: inline-size;
}

/* ==========================================
   AJUSTE DE PROPORCIÓN PARA ESCRITORIO (WINDOWS)
   ========================================== */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

/* ==========================================
   CAPA DE FONDO
   ========================================== */
.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* ==========================================
   COORDENADAS DE BOTONES SUPERIORES
   ========================================== */
.indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 5;
}

.ayuda {
    position: absolute;
    top: 7.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 5;
}

.whatsapp {
    position: absolute;
    top: 37%;
    left: 1%;
    width: 24%;
    z-index: 5;
}

/* ==========================================
   COORDENADAS DE LAS IMÁGENES DE PRODUCTOS
   ========================================== */
.monedas {
    position: absolute;
    top: 13%;
    left: 5.83%;
    width: 88.33%;
    z-index: 3;
}

.billetes {
    position: absolute;
    top: 52.5%;
    left: 5.74%;
    width: 88.51%;
    z-index: 3;
}

/* ==========================================
   MARCOS Y DIVISIONES DECORATIVAS
   ========================================== */
.borde-azul {
    position: absolute;
    width: 100%;
    height: auto;
    z-index: 4;
    left: 0;
}

.borde-top {
    top: 0%;
}

.borde-mid {
    top: 39%;
}

/* ==========================================
   REGLAS GRÁFICAS BASE PARA AMBOS TEXTOS
   ========================================== */
.texto-reloj-personal, .texto-reloj-correspondencia {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 6.5cqw;
    z-index: 5;
    pointer-events: none;
    text-align: right;
    line-height: 1.1;
    transform-origin: right center;
}

/* ==========================================
   AJUSTES Y GRADUACIÓN PARA ANCHOS EN ANDROID
   ========================================== */
.texto-reloj-personal {
    top: 0.5%;
    right: 2%;
    transform: scaleX(0.70);
}

.texto-reloj-correspondencia {
    top: 39.5%;
    right: 2%;
    transform: scaleX(0.70);
}

/* ==========================================
   AJUSTES Y GRADUACIÓN PARA ANCHOS EN WINDOWS
   ========================================== */
@media (min-width: 768px) {
    .texto-reloj-personal {
        transform: scaleX(0.60);
    }
    
    .texto-reloj-correspondencia {
        transform: scaleX(0.60);
    }
}

/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR Y DIVISIONES
   ========================================== */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
}

.zona-inicio   { left: 0%;  width: 25%; }
.zona-oficina  { left: 25%; width: 25%; }
.zona-marcaje  { left: 50%; width: 25%; }
.zona-escolar  { left: 75%; width: 25%; }

.indice img, .ayuda img, .whatsapp img, .monedas img, .billetes img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/fondo-linea-seguridad.webp" alt="Fondo">

    <a href="seguridad.html" class="indice">
        <img src="imagenes/botones/BtnVerLista.webp" alt="Índice">
    </a>

    <a href="ImagInfoAyuda.html" class="ayuda">
        <img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda">
    </a>

    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank">
        <img src="imagenes/botones/BtnWts.webp" alt="WhatsApp">
    </a>

    <img src="imagenes/fondos/borde-azul3.webp" class="borde-azul borde-top" alt="Borde Superior">
    <img src="imagenes/fondos/borde-azul3.webp" class="borde-azul borde-mid" alt="Separador Medio">

    <div class="texto-reloj-personal">RELOJ DE CONTROL<br>DE PERSONAL</div>
    <div class="texto-reloj-correspondencia">RELOJ CONTROL DE<br>CORRESPONDENCIA</div>

    <div class="monedas">
        <img src="imagenes/productos/RelojBiometricoZE-110.webp" alt="Reloj Biométrico ZE-110">
    </div>

    <div class="billetes">
        <img src="imagenes/productos/ContadorCorrespondenciaZE-111.webp" alt="Contador Correspondencia ZE-111">
    </div>

    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar"></a>
    </div>
</div>

</body>
</html>
