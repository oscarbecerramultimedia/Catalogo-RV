<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj de Control</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

.indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 5;
}

.ayuda {
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 5;
}

.whatsapp {
    position: absolute;
    top: 37%;
    left: 1%;
    width: 24%;
    z-index: 5;
}

.indice img,
.ayuda img,
.whatsapp img {
    width: 100%;
    display: block;
}

/* Producto 1: Reloj Biométrico ZE-110 (477px / 540px = 88.33%) */
.monedas {
    position: absolute;
    top: 11.5%;
    left: 5.83%;
    width: 88.33%;
    z-index: 3;
}

/* Producto 2: Contador Correspondencia ZE-111 (478px / 540px = 88.51%) */
.billetes {
    position: absolute;
    top: 52.5%;
    left: 5.74%;
    width: 88.51%;
    z-index: 3;
}

.monedas img,
.billetes img {
    width: 100%;
    display: block;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
}

.zona-inicio   { left: 0%;  width: 25%; }
.zona-oficina  { left: 25%; width: 25%; }
.zona-marcaje  { left: 50%; width: 25%; }
.zona-escolar  { left: 75%; width: 25%; }

</style>
</head>

<body>

<div class="contenedor">

    <img class="fondo"
         src="imagenes/fondos/FondoSegrFich05.webp"
         alt="Fondo">

    <a href="seguridad.html" class="indice">
        <img src="imagenes/botones/BtnVerLista.webp" alt="Índice">
    </a>

    <a href="ImagInfoAyuda.html" class="ayuda">
        <img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda">
    </a>

    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank">
        <img src="imagenes/botones/BtnWts.webp" alt="WhatsApp">
    </a>

    <div class="monedas">
        <img src="imagenes/productos/RelojBiometricoZE-110.webp"
             alt="Reloj Biométrico ZE-110">
    </div>

    <div class="billetes">
        <img src="imagenes/productos/ContadorCorrespondenciaZE-111.webp"
             alt="Contador Correspondencia ZE-111">
    </div>

    <div class="barra-navegacion-unica">

        <img src="imagenes/botones/TiraPegatinasCompleta.webp"
             class="tira-pegatinas-img"
             alt="Navegación">

        <a href="seguridad.html" class="zona-activa zona-inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar"></a>

    </div>

</div>

</body>
</html>
