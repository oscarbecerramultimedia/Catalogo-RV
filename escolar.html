<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Escolar</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: #73A9E4; display: flex; justify-content: center; align-items: center; }
.contenedor { position: relative; width: 100vw; height: 100dvh; overflow: hidden; container-type: size; }
@media (min-width: 768px) { .contenedor { height: 100dvh; width: calc(100dvh * 540 / 1200); max-width: 100vw; box-shadow: 0 0 15px rgba(0,0,0,0.2); } .producto-enlace { font-size: 22px !important; } }
.fondo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
.banner { position: absolute; top: 0; left: 0; width: 100%; height: 23%; object-fit: fill; z-index: 2; }
.lista-productos { position: absolute; top: 23%; left: 10%; width: 80%; height: 60%; overflow-y: auto !important; z-index: 3; font-family: sans-serif; scrollbar-width: thin; scrollbar-color: rgba(220, 77, 210, 0.35) transparent; }
.lista-productos::-webkit-scrollbar { width: 4px; display: block !important; }
.lista-productos::-webkit-scrollbar-thumb { background-color: rgba(220, 77, 210, 0.35); border-radius: 4px; }
.producto-enlace { display: block; padding: 6px 0; margin-bottom: 2px; color: #1a253c; text-decoration: none; font-size: 6.5cqw; font-weight: bold; border-bottom: 1px solid rgba(0, 0, 0, 0.08); -webkit-tap-highlight-color: rgba(220, 77, 210, 0.35); }
.btn-volver { position: absolute; top: 14.5%; left: 2%; width: 14%; z-index: 4; }
.btn-volver img { width: 100%; display: block; }
.barra-navegacion-unica { position: absolute; bottom: 0; left: 0; width: 100%; height: 17%; z-index: 4; }
.tira-pegatinas-img { width: 100%; height: 100%; object-fit: fill; display: block; }
.zona-activa { position: absolute; top: 0; height: 100%; cursor: pointer; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
<body>
<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/fondo-linea-escolar.webp" alt="Fondo">
    <img class="banner" src="imagenes/banners/ImagBannerEscolar.webp" alt="Línea Escolar">
    
    <div class="lista-productos">
        <a href="escolar-marcadores.html#resaltador" class="producto-enlace">Resaltador</a>
        <a href="escolar-marcadores.html#marcador" class="producto-enlace">Marcador Permanente Y Borrable</a>
        
        <a href="escolar-escritura.html#boligrafo" class="producto-enlace">Bolígrafo Con Tapa</a>
        <a href="escolar-escritura.html#lapiz" class="producto-enlace">Lápiz Negro Y Rojo</a>
        
        <a href="escolar-arte.html#plumillas" class="producto-enlace">Plumillas</a>
        <a href="escolar-arte.html#colores" class="producto-enlace">Colores</a>
        
        <a href="escolar-accesorios.html#borradores" class="producto-enlace">Borradores</a>
        <a href="escolar-accesorios.html#portaborrador" class="producto-enlace">Portaborrador</a>
        <a href="escolar-accesorios.html#tajalapiz" class="producto-enlace">Tajalapiz Metalico</a>
        
        <a href="escolar-varios.html#cintas" class="producto-enlace">Cintas Adhesivas</a>
        <a href="escolar-varios.html#regla" class="producto-enlace">Regla de 30 cm</a>
    </div>

    <a href="categorias.html" class="btn-volver"><img src="imagenes/botones/Btn-indice-m.webp" alt="Volver"></a>
    
    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar"></a>
    </div>
</div>
</body>
</html>
