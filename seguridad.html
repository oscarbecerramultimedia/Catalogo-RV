<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Seguridad y Biométricos</title>
<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. CONTENEDOR MAESTRO ESCALABLE */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

/* 3. REGLA PARA ESCRITORIO (Monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); 
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
    
    /* CONGELA EL TAMAÑO EN WINDOWS */
    .producto-enlace {
        font-size: 22px !important; 
    }
}

/* 4. TRES ELEMENTOS GRÁFICOS ESTRUCTURALES */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    z-index: 1;
}

.banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 23%; 
    object-fit: fill;
    z-index: 2;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0%;        
    left: 0%;          
    width: 100%;       
    height: 17%;       
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* 5. LISTADO DE PRODUCTOS (CON SCROLL DISCRETO) */
.lista-productos {
    position: absolute;
    top: 23%;            
    left: 10%;
    width: 80%;
    height: 60%;         
    overflow-y: auto !important; 
    z-index: 3;
    font-family: sans-serif;

    /* Oculta barra estándar en Firefox manteniendo funcionalidad */
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
}

/* Barra de scroll de 4px para Android/Chrome */
.lista-productos::-webkit-scrollbar {
    width: 4px;
}

.lista-productos::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.15); 
    border-radius: 4px;
}

.producto-enlace {
    display: block;
    padding: 6px 0;      
    margin-bottom: 2px;  
    color: #1a253c;
    text-decoration: none;
    font-size: 6.5cqw;   
    font-weight: bold;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
}
