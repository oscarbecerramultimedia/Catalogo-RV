<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Seguridad y Biométricos</title>
<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. CONTENEDOR MAESTRO ESCALABLE */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

/* 3. REGLA PARA ESCRITORIO (Monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); 
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
    
    /* CONGELA EL TAMAÑO EN WINDOWS */
    .producto-enlace {
        font-size: 22px !important; 
    }
}

/* 4. ELEMENTOS GRÁFICOS ESTRUCTURALES */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    z-index: 1;
}

.banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 23%; 
    object-fit: fill;
    z-index: 2;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0%;        
    left: 0%;          
    width: 100%;       
    height: 17%;       
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* 5. LISTADO DE PRODUCTOS (CON SCROLLBAR CIAN PERMANENTE) */
.lista-productos {
    position: absolute;
    top: 23%;            /* Subido hasta el borde de la línea roja */
    left: 10%;
    width: 80%;
    height: 60%;         /* Extensión vertical hacia arriba */
    overflow-y: auto !important; 
    z-index: 3;
    font-family: sans-serif;

    /* Forzar visibilidad sutil en Firefox */
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 255, 255, 0.35) transparent;
}

/* Configuración de barra permanente y sutil con color #00ffff para Android/WebKit */
.lista-productos::-webkit-scrollbar {
    width: 4px;
    display: block !important;
}

.lista-productos::-webkit-scrollbar-track {
    background: transparent;
}

.lista-productos::-webkit-scrollbar-thumb {
    background-color: rgba(0, 255, 255, 0.35);
    border-radius: 4px;
}

.producto-enlace {
    display: block;
    padding: 6px 0;      /* Interlineado reducido para compactar la lista */
    margin-bottom: 2px;  /* Distancia minimizada entre textos */
    color: #1a253c;
    text-decoration: none;
    font-size: 6.5cqw;   /* Tamaño grande en Android */
    font-weight: bold;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
}

/* 6. NUEVO BOTÓN VOLVER PERIFÉRICO */
.btn-volver {
    position: absolute;
    top: 24%;
    left: 2%;
    width: 8%;           /* Mismo ancho proporcional que el botón de ayuda */
    z-index: 4;
}

.btn-volver img {
    width: 100%;
    display: block;
}

/* 7. ZONAS ACTIVAS INVISIBLES SOBRE LAS PEGATINAS */
.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;
}

/* Distribución de botones invisibles */
.zona-inicio    { left: 0%;   width: 25%; }
.zona-oficina   { left: 25%;  width: 25%; }
.zona-marcaje   { left: 50%;  width: 25%; }
.zona-escolar   { left: 75%;  width: 25%; }
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/ImagFondoSeguridad.webp" alt="Fondo">
    
    <img class="banner" src="imagenes/banners/ImagBannerSeguridad.webp" alt="Línea Seguridad">
    
    <div class="lista-productos">
        <a href="seguridad-ze101.html" class="producto-enlace">Contador De Monedas</a>
        <a href="seguridad-ze102.html" class="producto-enlace">Contador De Billetes</a>
        <a href="seguridad-ze104.html" class="producto-enlace">Detector De Billetes</a>
        <a href="seguridad-caja.html" class="producto-enlace">Caja Menor Metalica</a>
        <a href="seguridad-cajafuerte.html" class="producto-enlace">Caja Fuerte</a>
        <a href="seguridad-relojpersonal.html" class="producto-enlace">Reloj Control De Personal</a>
        <a href="seguridad-relojcorresp.html" class="producto-enlace">Reloj Control De Correspondencia</a>
        <a href="seguridad-protector.html" class="producto-enlace">Protector De Cheques</a>
        <a href="seguridad-destructora.html" class="producto-enlace">Destructora De Documentos</a>
    </div>

    <a href="categorias.html" class="btn-volver" title="Volver">
        <img src="imagenes/botones/ImagBtnVolver.webp" alt="Volver">
    </a>
    
    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        
        <a href="categorias.html" class="zona-activa zona-inicio" title="Inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina" title="Oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje" title="Marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar" title="Escolar"></a>
    </div>
</div>

</body>
</html>
