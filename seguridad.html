<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Seguridad y Biométricos</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: #73A9E4; display: flex; justify-content: center; align-items: center; }
.contenedor { position: relative; width: 100vw; height: 100dvh; overflow: hidden; container-type: size; }
@media (min-width: 768px) { .contenedor { height: 100dvh; width: calc(100dvh * 540 / 1200); max-width: 100vw; box-shadow: 0 0 15px rgba(0,0,0,0.2); } .producto-enlace { font-size: 22px !important; } }
.fondo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }
.banner { position: absolute; top: 0; left: 0; width: 100%; height: 23%; object-fit: fill; z-index: 2; }
.lista-productos { position: absolute; top: 23%; left: 10%; width: 80%; height: 60%; overflow-y: auto !important; z-index: 3; font-family: sans-serif; scrollbar-width: thin; scrollbar-color: rgba(0, 255, 255, 0.35) transparent; }
.lista-productos::-webkit-scrollbar { width: 4px; display: block !important; }
.lista-productos::-webkit-scrollbar-thumb { background-color: rgba(0, 255, 255, 0.35); border-radius: 4px; }
.producto-enlace { display: block; padding: 6px 0; margin-bottom: 2px; color: #1a253c; text-decoration: none; font-size: 6.5cqw; font-weight: bold; border-bottom: 1px solid rgba(0, 0, 0, 0.08); }
.btn-volver { position: absolute; top: 14.5%; left: 2%; width: 14%; z-index: 4; }
.btn-volver img { width: 100%; display: block; }
.barra-navegacion-unica { position: absolute; bottom: 0; left: 0; width: 100%; height: 17%; z-index: 4; }
.tira-pegatinas-img { width: 100%; height: 100%; object-fit: fill; display: block; }
.zona-activa { position: absolute; top: 0; height: 100%; cursor: pointer; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
<body>
<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/fondo-linea-seguridad.webp" alt="Fondo">
    <img class="banner" src="imagenes/banners/ImagBannerSeguridad.webp" alt="Línea Seguridad">
    
    <div class="lista-productos">
        <a href="seguridad-productos.html#contadores" class="producto-enlace">Contador De Monedas</a>
        <a href="seguridad-productos.html#contadores" class="producto-enlace">Contador De Billetes</a>
        <a href="seguridad-productos.html#detectores" class="producto-enlace">Detector De Billetes</a>
        <a href="seguridad-productos.html#cajas" class="producto-enlace">Caja Menor Metalica</a>
        <a href="seguridad-productos.html#cajas" class="producto-enlace">Caja Fuerte</a>
        <a href="seguridad-productos.html#relojes" class="producto-enlace">Reloj Control De Personal</a>
        <a href="seguridad-productos.html#relojes" class="producto-enlace">Reloj Control De Correspondencia</a>
        <a href="seguridad-productos.html#cheques" class="producto-enlace">Protector De Cheques</a>
        <a href="seguridad-productos.html#destructoras" class="producto-enlace">Destructora De Documentos</a>
    </div>

    <a href="categorias.html" class="btn-volver"><img src="imagenes/botones/Btn-indice.webp" alt="Volver"></a>
    
    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar"></a>
    </div>
</div>
</body>
</html>
