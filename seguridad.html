<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Seguridad y Biométricos</title>
<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. REGLA PARA MÓVIL (Por defecto) */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

/* 3. REGLA PARA ESCRITORIO (Monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); 
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
}

/* 4. TRES ELEMENTOS GRÁFICOS ESTRUCTURALES */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    z-index: 1;
}

.banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 23%; 
    object-fit: fill;
    z-index: 2;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0%;        
    left: 0%;          
    width: 100%;       
    height: 17%;       
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* 5. LISTADO DE PRODUCTOS (UNIFICADO PARA WINDOWS Y ANDROID) */
.lista-productos {
    position: absolute;
    top: 26%;
    left: 12%;
    width: 76%;
    height: 56%; 
    overflow-y: auto !important; 
    z-index: 3;
    font-family: sans-serif;
}

.producto-enlace {
    display: block;
    padding: 10px 0;
    margin-bottom: 4px;
    color: #1a253c;
    text-decoration: none;
    font-size: 2.2vh;    /* Amarrado a la altura de pantalla para unificar escala */
    font-weight: bold;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
}

/* 6. ZONAS ACTIVAS INVISIBLES SOBRE LAS PEGATINAS */
.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;
}

/* Distribución porcentual de los 4 botones invisibles */
.zona-inicio    { left: 0%;   width: 25%; }
.zona-oficina   { left: 25%;  width: 25%; }
.zona-marcaje   { left: 50%;  width: 25%; }
.zona-escolar   { left: 75%;  width: 25%; }
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/ImagFondoSeguridad.webp" alt="Fondo">
    
    <img class="banner" src="imagenes/banners/ImagBannerSeguridad.webp" alt="Línea Seguridad">
    
    <div
