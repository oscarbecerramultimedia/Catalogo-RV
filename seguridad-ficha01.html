<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Monedas y Billetes</title>

<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. CONTENEDOR MAESTRO ESCALABLE (540x1200) */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

/* 3. FONDO */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* 4. BOTONES PERIFÉRICOS (Ajuste estricto de aspecto) */
.indice {
    position: absolute;
    top: 1.5%;
    left: 3%;
    width: 16%;
    aspect-ratio: 600 / 596;
    z-index: 5;
}

.ayuda {
    position: absolute;
    top: 4.5%;
    right: 4%;
    width: 5%;
    aspect-ratio: 100 / 142;
    z-index: 5;
}

.whatsapp {
    position: absolute;
    top: 34%;
    left: 2%;
    width: 16%;
    aspect-ratio: 700 / 1040;
    z-index: 5;
}

.indice img,
.ayuda img,
.whatsapp img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* 5. IMÁGENES DE PRODUCTOS (Ubicación centralizada) */
.monedas {
    position: absolute;
    top: 9%;
    left: 6%;
    width: 82%;
    aspect-ratio: 501 / 236;
    z-index: 3;
}

.billetes {
    position: absolute;
    top: 47%;
    left: 5%;
    width: 88%;
    aspect-ratio: 510 / 296;
    z-index: 3;
}

.monedas img,
.billetes img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* 6. BARRA DE NAVEGACIÓN INFERIOR COINCIDENTE */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;
}

.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>

<body>

<div class="contenedor">

    <img class="fondo" src="imagenes/fondos/FondoSegrFich01.webp" alt="Fondo">

    <a href="seguridad.html" class="indice" title="Índice">
        <img src="imagenes/botones/BtnIndice.webp" alt="Índice">
    </a>

    <a href="ImagInfoAyuda.html" class="ayuda" title="Ayuda">
        <img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda">
    </a>

    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank" title="WhatsApp">
        <img src="imagenes/botones/BtnWts.webp" alt="WhatsApp">
    </a>

    <div class="monedas">
        <img src="imagenes/productos/ConDeMndsZE-101.webp" alt="Contador de Monedas">
    </div>

    <div class="billetes">
        <img src="imagenes/productos/ConDeBlitsZE-102.webp" alt="Contador de Billetes">
    </div>

    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">

        <a href="categorias.html" class="zona-activa zona-inicio" title="Inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina" title="Oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje" title="Marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar" title="Escolar"></a>
    </div>

</div>

</body>
</html>
