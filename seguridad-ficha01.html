<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Monedas y Billetes</title>

<style>
html, body {
    margin: 0; padding: 0; width: 100%; height: 100dvh;
    overflow: hidden; background: #73A9E4;
    display: flex; justify-content: center; align-items: center;
}

.contenedor {
    position: relative; width: 100vw; height: 100dvh; overflow: hidden;
    container-type: inline-size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh; width: calc(100dvh * 540 / 1200);
        max-width: 100vw; box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

.fondo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }

.indice { position: absolute; top: 1%; left: 1%; width: 14%; z-index: 5; }
.ayuda { position: absolute; top: 6%; right: 1.5%; width: 4.5%; z-index: 5; }
.whatsapp { position: absolute; top: 37%; left: 1%; width: 24%; z-index: 5; }

.monedas { position: absolute; top: 14%; left: 8%; width: 84%; z-index: 3; }
.billetes { position: absolute; top: 54%; left: 5%; width: 90%; z-index: 3; }

.borde-azul { position: absolute; width: 100%; height: auto; z-index: 4; left: 0; }
.borde-top { top: 0%; }
.borde-mid { top: 43%; }

/* ==========================================
   1. REGLAS COMPARTIDAS BASE
   No modifique coordenadas ni escalas aquí.
   ========================================== */
.texto-monedas, .texto-billetes {
    position: absolute;
    color: #1a4d8c; 
    font-family: sans-serif; 
    font-weight: bold;
    font-size: 8cqw; 
    z-index: 5; 
    pointer-events: none;
    text-align: right; 
    white-space: nowrap;
    transform-origin: right center; 
}

/* ==========================================
   2. CONTROLES INDEPENDIENTES PARA ANDROID (MÓVILES)
   ========================================== */
.texto-monedas { 
    top: 0.5%;      /* Altura en Android */
    right: 2%;      /* Posición horizontal en Android */
    transform: scaleX(0.65); /* Estrechez en Android */
}

.texto-billetes { 
    top: 43.5%;     /* Altura en Android */
    right: 2%;      /* Posición horizontal en Android */
    transform: scaleX(0.67); /* Estrechez en Android */
}

/* ==========================================
   3. CONTROLES INDEPENDIENTES PARA WINDOWS (ESCRITORIO)
   ========================================== */
@media (min-width: 768px) {
    .texto-monedas {
        top: 0.5%;      /* Altura en Windows */
        right: 2%;      /* Posición horizontal en Windows */
        transform: scaleX(0.59); /* Estrechez en Windows */
    }
    
    .texto-billetes {
        top: 43.5%;     /* Altura en Windows */
        right: 2%;      /* Posición horizontal en Windows */
        transform: scaleX(0.61); /* Estrechez en Windows */
    }
}

.barra-navegacion-unica { position: absolute; bottom: 0; left: 0; width: 100%; height: 17%; z-index: 4; }
.tira-pegatinas-img { width: 100%; height: 100%; object-fit: fill; display: block; }
.zona-activa { position: absolute; top: 0; height: 100%; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }

.indice img, .ayuda img, .whatsapp img, .monedas img, .billetes img { width: 100%; display: block; }
</style>
</head>

<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/fondo-linea-seguridad.webp" alt="Fondo">

    <a href="seguridad.html" class="indice"><img src="imagenes/botones/BtnVerLista.webp" alt="Índice"></a>
    <a href="ImagInfoAyuda.html" class="ayuda"><img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda"></a>
    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank"><img src="imagenes/botones/BtnWts.webp" alt="WhatsApp"></a>

    <img src="imagenes/fondos/borde-azul2.webp" class="borde-azul borde-top" alt="Borde Superior">
    <img src="imagenes/fondos/borde-azul2.webp" class="borde-azul borde-mid" alt="Borde Medio">

    <div class="texto-monedas">CONTADOR DE MONEDAS</div>
    <div class="texto-billetes">CONTADOR DE BILLETES</div>

    <div class="monedas"><img src="imagenes/productos/ConDeMndsZE-101.webp" alt="Contador de Monedas"></div>
    <div class="billetes"><img src="imagenes/productos/ConDeBlltsZE-102.webp" alt="Contador de Billetes"></div>

    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar"></a>
    </div>
</div>

</body>
</html>
