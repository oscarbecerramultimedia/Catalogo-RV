<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>page-seguridad-ficha-01</title>

<style>
/* Estilos Base - Centralizados */
html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; overflow: hidden; background: #ffffff; display: flex; justify-content: center; align-items: center; }

.css-contenedor { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }

@media (min-width: 768px) {
    .css-contenedor { height: 100dvh; width: calc(100dvh * 540 / 1200); max-width: 100vw; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
}

/* Capas de Imagen */
.css-img-fondo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }

/* Bordes y Textos con nomenclatura estricta */
.css-borde-azul { position: absolute; width: 80%; height: auto; z-index: 4; left: 10%; }
.css-borde-top { top: 12%; }
.css-borde-mid { top: 50%; }

.css-texto-titular {
    position: absolute; width: 80%; left: 10%;
    color: #1a4d8c; font-family: sans-serif; font-weight: bold;
    font-size: 1.2rem; text-align: center; z-index: 5; pointer-events: none;
}
.css-txt-monedas { top: 12.5%; }
.css-txt-billetes { top: 50.5%; }

/* ... (resto de clases de navegación e índices siguiendo el mismo prefijo css-) ... */
</style>
</head>

<body>
<div class="css-contenedor">
    <img class="css-img-fondo" src="imagenes/fondos/FondoSegrFich01.webp" alt="Fondo">

    <img src="imagenes/bordes/img-borde-azul-02.webp" class="css-borde-azul css-borde-top" alt="Borde Superior">
    <img src="imagenes/bordes/img-borde-azul-02.webp" class="css-borde-azul css-borde-mid" alt="Borde Medio">

    <div class="css-texto-titular css-txt-monedas">CONTADOR DE MONEDAS</div>
    <div class="css-texto-titular css-txt-billetes">CONTADOR DE BILLETES</div>

    </div>
</body>
</html>
