<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector de Billetes</title>

<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. CONTENEDOR MAESTRO ESCALABLE */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

/* REGLA PARA ESCRITORIO (Monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

/* 3. FONDO */
.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* 4. BOTONES PERIFÉRICOS CON Z-INDEX ALTO */
.indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 5;
}

.ayuda {
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 5;
}

.whatsapp {
    position: absolute;
    top: 42%;
    right: 1%;
    width: 24%;
    z-index: 5;
}

.indice img,
.ayuda img,
.whatsapp img {
    width: 100%;
    display: block;
}

/* 5. BLOQUES DE PRODUCTOS ESTÁTICOS */
.det-ze104 {
    position: absolute;
    top: 9.5%;
    left: 5%;
    width: 88%;
    z-index: 3;
}

.det-ze105 {
    position: absolute;
    top: 28.5%;
    left: 4.5%;
    width: 88%;
    z-index: 3;
}

.det-ze106 {
    position: absolute;
    top: 55%;
    left: 5%;
    width: 88%;
    z-index: 3;
}

.det-ze104 img,
.det-ze105 img,
.det-ze106 img {
    width: 100%;
    display: block;
}

/* 6. BARRA DE NAVEGACIÓN ÚNICA */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
}

.zona-inicio   { left: 0%;  width: 25%; }
.zona-oficina  { left: 25%; width: 25%; }
.zona-marcaje  { left: 50%; width: 25%; }
.zona-escolar  { left: 75%; width: 25%; }

</style>
</head>

<body>

<div class="contenedor">

    <img class="fondo"
         src="imagenes/fondos/FondoSegrFich03.webp"
         alt="Fondo">

    <a href="seguridad.html" class="indice" title="Volver al índice">
        <img src="imagenes/botones/BtnVerLista.webp" alt="Índice">
    </a>

    <a href="ImagInfoAyuda.html" class="ayuda" title="Ayuda">
        <img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda">
    </a>

    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank" title="Contacto WhatsApp">
        <img src="imagenes/botones/BtnWtsDerecha.webp" alt="WhatsApp">
    </a>

    <div class="det-ze104">
        <img src="imagenes/productos/DetBilletesZE-104.webp"

    </div>

    <div class="det-ze105">
        <img src="imagenes/productos/DetBilletesZE-105.webp"
             alt="Detector de Billetes ZE-105">
    </div>

    <div class="det-ze106">

             alt="Detector de Billetes ZE-106">
    </div>

    <div class="barra-navegacion-unica">

        <img src="imagenes/botones/TiraPegatinasCompleta.webp"
             class="tira-pegatinas-img"
             alt="Navegación">

        <a href="seguridad.html" class="zona-activa zona-inicio" title="Inicio"></a>
        <a href="oficina.html" class="zona-activa zona-oficina" title="Oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje" title="Marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar" title="Escolar"></a>

    </div>

</div>
