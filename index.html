<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo RV</title>
<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. REGLA PARA MÓVIL (Por defecto) */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

/* 3. REGLA PARA ESCRITORIO (Se activa en monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); 
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
}

/* 4. FONDO Y BOTÓN INTERNO */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* LA CORRECCIÓN EXACTA: 'fill' mete toda la gráfica en la pantalla sin recortes */
    object-fit: fill;
    display: block;
}

.boton-catalogo {
    position: absolute;
    top: 45%;
    left: 52%;
    transform: translate(-50%, -50%);
    width: min(35%, 260px);
    z-index: 2;
}

.boton-catalogo img {
    width: 100%;
    height: auto;
    display: block;
}
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/ImagFondoPortada.webp" alt="Portada">
    <a href="categorias.html" class="boton-catalogo">
        <img src="imagenes/botones/ImagBotPortada.webp" alt="Catálogo">
    </a>
</div>

</body>
</html>
