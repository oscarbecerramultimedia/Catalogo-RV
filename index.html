<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo RV</title>
<style>
/* Forzamos que el body sea un bloque sólido sin espacio interno */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000; /* Fondo negro por seguridad */
}

/* El contenedor es el absoluto amo de la pantalla */
.contenedor {
    position: fixed; 
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
}

.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* 'cover' es obligatorio aquí para evitar espacios */
    object-fit: cover; 
    object-position: center;
}

.boton-catalogo {
    position: absolute;
    top: 45%;
    left: 52%;
    transform: translate(-50%, -50%);
    width: 35%;
    max-width: 260px;
}

.boton-catalogo img {
    width: 100%;
    display: block;
}
</style>
</head>
<body>
    <div class="contenedor">
        <img class="fondo" src="imagenes/fondos/ImagFondoPortada.webp" alt="Portada">
        <a href="categorias.html" class="boton-catalogo">
            <img src="imagenes/botones/ImagBotPortada.webp" alt="Catálogo">
        </a>
    </div>
</body>
</html>
