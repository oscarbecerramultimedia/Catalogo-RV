<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo RV</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100dvh;
    overflow:hidden;
    background:#ffffff;
}

.contenedor{
    position:relative;
    width:100vw;
    height:100dvh;
}

.fondo{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.boton-catalogo{
    position:absolute;
    top:45%;
    left:52%;
    transform:translate(-50%,-50%);
    width:min(35%,260px);
}

.boton-catalogo img{
    width:100%;
    height:auto;
    display:block;
}

</style>

</head>

<body>

<div class="contenedor">

    <img class="fondo"
         src="imagenes/fondos/ImagFondoPortada.webp"
         alt="Portada">

    <a href="categorias.html" class="boton-catalogo">
        <img src="imagenes/botones/ImagBotPortada.webp"
             alt="Catálogo">
    </a>

</div>

</body>
</html>
