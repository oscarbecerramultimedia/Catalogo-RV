<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo RV</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    /* Color de respaldo por si la imagen tarda en cargar */
    background-color: #000; 
    display: flex;
    justify-content: center;
    align-items: center;
}

.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    /* Mantiene la relación de aspecto sin deformar */
    aspect-ratio: 540 / 1200;
    /* En pantallas muy anchas, limita el tamaño para que no se deforme */
    max-width: calc(100dvh * 540 / 1200);
    overflow: hidden;
}

.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    /* 'cover' asegura que se llene todo el espacio del contenedor sin bordes blancos */
    object-fit: cover;
    display: block;
}

.boton-catalogo {
    position: absolute;
    top: 45%;
    left: 52%;
    transform: translate(-50%, -50%);
    width: min(40%, 260px);
    z-index: 2;
}

.boton-catalogo img {
    width: 100%;
    height: auto;
    display: block;
}
</style>
</head>
<body>
<div class="contenedor">
    <img class="fondo"
         src="imagenes/fondos/ImagFondoPortada.webp"
         alt="Portada">
    <a href="categorias.html" class="boton-catalogo">
        <img src="imagenes/botones/ImagBotPortada.webp"
             alt="Catálogo">
    </a>
</div>
</body>
</html>
