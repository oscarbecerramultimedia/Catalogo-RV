<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorías de Productos</title>
<style>
/* 1. RESET Y BASE GENERAL */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 2. CONTENEDOR MAESTRO ESCALABLE */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

/* 3. REGLA PARA ESCRITORIO (Monitores) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); 
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2); 
    }
}

/* 4. FONDOS Y BANNERS */
.fondo {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    z-index: 1;
}

.banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 23%;
    overflow: hidden;
    z-index: 2;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    opacity: 0;
    transition: opacity 1s;
}

.slide.active {
    opacity: 1;
}

/* 5. BOTONES DE LÍNEAS PRINCIPALES */
.boton-linea {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    z-index: 3;
}

.seguridad { top: 28%; }
.oficina   { top: 43%; }
.marcaje   { top: 57%; }
.escolar   { top: 72%; }

.boton-linea img {
    width: 100%;
    display: block;
}

/* 6. NUEVOS BOTONES PERIFÉRICOS CON CONTROL DE PROPORCIÓN */
.btn-periferico {
    position: absolute;
    z-index: 4;
}

.btn-periferico img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* Posición y dimensiones basadas estrictamente en píxeles y ubicación de captura */
.ayuda {
    top: 24%;
    left: 2%;
    width: 8%;
    aspect-ratio: 182 / 178;
}

.inicio {
    bottom: 1%;
    left: 3%;
    width: 10%;
    aspect-ratio: 168 / 168;
}

.logo-obm {
    bottom: 0%;
    left: 24%;
    width: 55%;
    aspect-ratio: 836 / 213;
}

.lo-nuevo {
    bottom: 5.5%;
    right: 2.5%;
    width: 24%;
    aspect-ratio: 260 / 148;
}
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/ImagFondoCategorias.webp" alt="Fondo">
    
    <div class="banner">
        <img src="imagenes/banners/ImagBannerCategorias01.webp" class="slide active">
        <img src="imagenes/banners/ImagBannerCategorias02.webp" class="slide">
        <img src="imagenes/banners/ImagBannerCategorias03.webp" class="slide">
        <img src="imagenes/banners/ImagBannerCategorias04.webp" class="slide">
    </div>
    
    <a href="seguridad.html" class="boton-linea seguridad">
        <img src="imagenes/botones/ImagBotLineaSeguridad.webp" alt="Línea Seguridad">
    </a>
    <a href="oficina.html" class="boton-linea oficina">
        <img src="imagenes/botones/ImagBotLineaOficina.webp" alt="Línea Oficina">
    </a>
    <a href="marcaje.html" class="boton-linea marcaje">
        <img src="imagenes/botones/ImagBotLineaMarcaje.webp" alt="Línea Marcaje">
    </a>
    <a href="escolar.html" class="boton-linea escolar">
        <img src="imagenes/botones/ImagBotLineaEscolar.webp" alt="Línea Escolar">
    </a>
    
    <a href="ImagInfoAyuda.html" class="btn-periferico ayuda" title="Ayuda">
        <img src="imagenes/botones/ImagBtnAyuda.webp" alt="Ayuda">
    </a>
    
    <a href="index.html" class="btn-periferico inicio" title="Inicio">
        <img src="imagenes/botones/ImagBtnInicio.webp" alt="Inicio">
    </a>
    
    <a href="https://oscarbecerramultimedia.github.io/Business-Card-Smart/" class="btn-periferico logo-obm" target="_blank" title="OBM Multimedia">
        <img src="imagenes/botones/ImagBotLogoOBM.webp" alt="Logo OBM">
    </a>
    
    <a href="index.html" class="btn-periferico lo-nuevo" title="Lo Nuevo">
        <img src="imagenes/botones/ImagBtnLoNuevo.webp" alt="Lo Nuevo">
    </a>
</div>

<script>
let actual = 0;
const slides = document.querySelectorAll('.slide');

setInterval(function(){
    slides[actual].classList.remove('active');
    actual = (actual + 1) % slides.length;
    slides[actual].classList.add('active');
}, 7000);
</script>

</body>
</html>
