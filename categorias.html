<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos de Oficina</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.contenedor{
    position:relative;
    width:100vw;
    height:100vh;
}

/* BANNER */

.banner{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:23%;
    overflow:hidden;
    z-index:1;
}

.slide{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:opacity 1s ease-in-out;
}

.slide.active{
    opacity:1;
}

/* ENLACES */

.enlaces{
    position:absolute;
    top:24%;
    left:10px;
    z-index:10;
}

.enlaces a{
    display:block;
    margin-bottom:5px;
    color:#000;
    text-decoration:none;
    font-size:14px;
}

/* BOTONES */

.menu-categorias{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    width:100%;
    z-index:5;
}

.menu-categorias img{
    width:min(80%, 420px);
    height:auto;
    display:block;
}

</style>

</head>

<body>

<div class="contenedor">

    <!-- BANNER -->

    <div class="banner">

        <img src="imagenes/banners/ImagBannerCategorias01.webp"
             class="slide active">

        <img src="imagenes/banners/ImagBannerCategorias02.webp"
             class="slide">

        <img src="imagenes/banners/ImagBannerCategorias03.webp"
             class="slide">

        <img src="imagenes/banners/ImagBannerCategorias04.webp"
             class="slide">

    </div>

    <!-- ENLACES -->

    <div class="enlaces">
        <a href="index.html">Inicio</a>
        <a href="categorias.html">Productos de Oficina</a>
    </div>

    <!-- BOTONES -->

    <div class="menu-categorias">

        <a href="seguridad.html">
            <img src="imagenes/botones/ImagBotLineaSeguridad.webp"
                 alt="Seguridad">
        </a>

        <a href="oficina.html">
            <img src="imagenes/botones/ImagBotLineaOficina.webp"
                 alt="Oficina">
        </a>

        <a href="marcaje.html">
            <img src="imagenes/botones/ImagBotLineaMarcaje.webp"
                 alt="Marcaje">
        </a>

        <a href="escolar.html">
            <img src="imagenes/botones/ImagBotLineaEscolar.webp"
                 alt="Escolar">
        </a>

    </div>

</div>

<script>

let actual = 0;

const slides = document.querySelectorAll('.slide');

setInterval(function(){

    slides[actual].classList.remove('active');

    actual++;

    if(actual >= slides.length){
        actual = 0;
    }

    slides[actual].classList.add('active');

}, 7000);

</script>

</body>
</html>
