<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos de Oficina</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* contenedor estable: Windows + Android */
.contenedor {
    position: relative;
    width: 100vw;
    max-width: 540px;
    height: 100dvh;
    aspect-ratio: 540 / 1200;
    overflow: hidden;
}

/* fondo ajustado sin recorte */
.fondo {
    position: absolute;
    inset: 0;
    width: 102%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* banner */
.banner {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 23%;
    overflow: hidden;
    z-index: 2;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s;
}

.slide.active {
    opacity: 1;
}

/* botones */
.boton {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    z-index: 3;
}

.seguridad { top: 31%; }
.oficina   { top: 46%; }
.marcaje   { top: 61%; }
.escolar   { top: 76%; }

.boton img {
    width: 100%;
    display: block;
}

/* enlaces */
.enlaces {
    position: absolute;
    left: 10px;
    bottom: 10px;
    z-index: 4;
}

.enlaces a {
    display: block;
    color: #fff;
    text-decoration: none;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="contenedor">

    <img class="fondo" src="imagenes/fondos/ImagFondoCategorias.webp" alt="Fondo">

    <div class="banner">
        <img src="imagenes/banners/ImagBannerCategorias01.webp" class="slide active">
        <img src="imagenes/banners/ImagBannerCategorias02.webp" class="slide">
        <img src="imagenes/banners/ImagBannerCategorias03.webp" class="slide">
        <img src="imagenes/banners/ImagBannerCategorias04.webp" class="slide">
    </div>

    <a href="seguridad.html" class="boton seguridad">
        <img src="imagenes/botones/ImagBotLineaSeguridad.webp" alt="">
    </a>

    <a href="oficina.html" class="boton oficina">
        <img src="imagenes/botones/ImagBotLineaOficina.webp" alt="">
    </a>

    <a href="marcaje.html" class="boton marcaje">
        <img src="imagenes/botones/ImagBotLineaMarcaje.webp" alt="">
    </a>

    <a href="escolar.html" class="boton escolar">
        <img src="imagenes/botones/ImagBotLineaEscolar.webp" alt="">
    </a>

    <div class="enlaces">
        <a href="index.html">Inicio</a>
    </div>

</div>

<script>
let actual = 0;
const slides = document.querySelectorAll('.slide');

setInterval(() => {
    slides[actual].classList.remove('active');
    actual = (actual + 1) % slides.length;
    slides[actual].classList.add('active');
}, 7000);
</script>

</body>
</html>
