<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea Oficina</title>

<style>
/* ==========================================================================
   1. CONFIGURACIÓN GLOBAL
   ========================================================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4; /* Ajustar color si la línea Oficina requiere otro fondo base */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================================================
   2. CONTENEDOR MAESTRO
   ========================================================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

/* ==========================================================================
   3. CAPAS FIJAS (Fondo y Botones)
   ========================================================================== */
.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1; 
}

.btn-ver-lista, .btn-ayuda, .btn-whatsapp {
    position: absolute;
    z-index: 10;
}

.btn-ver-lista { top: 1.5%; left: 2%; width: 14%; }
.btn-ayuda { top: 9.5%; right: 0.5%; width: 4.5%; }
.btn-whatsapp { top: 50%; right: 0.5%; width: 20%; }

.btn-ver-lista img, .btn-ayuda img, .btn-whatsapp img {
    width: 100%;
    display: block;
}

/* ==========================================================================
   4. VISOR DESLIZANTE (SCROLL)
   ========================================================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%; 
    overflow-y: auto;
    scroll-snap-type: y mandatory; 
    scroll-behavior: smooth;
    z-index: 5; 
}

.visor-productos-scroll::-webkit-scrollbar {
    width: 0px;
    background: transparent;
}

.bloque-seccion {
    position: relative; 
    width: 100%;
    height: 100%; 
    scroll-snap-align: start; 
    flex-shrink: 0;
    overflow: hidden; 
}

/* ==========================================================================
   5. COMPONENTES GRÁFICOS BASE
   ========================================================================== */
.borde-contenedor-titulo {
    position: absolute;
    right: 0; 
    width: 100%; 
    height: auto;
    z-index: 6;
}

.borde-contenedor-titulo img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    object-position: right top;
}

.separador-linea {
    position: absolute;
    left: 5%;
    width: 90%;
    height: auto;
    z-index: 6;
}

.separador-linea img {
    width: 100%;
    display: block;
}

.render-producto {
    position: absolute;
    left: 5%;
    width: 90%;
    z-index: 7;
    display: flex;
    justify-content: center;
    align-items: center;
}

.render-producto img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.rotulo-titulo {
    position: absolute;
    color: #1a4d8c; /* Ajustar color si Oficina maneja otra paleta */
    font-family: sans-serif;
    font-weight: bold;
    font-size: 6.8cqw;
    z-index: 8;
    pointer-events: none;
    text-align: right;
    white-space: nowrap;
    transform-origin: right center; 
}

/* ==========================================================================
   6. COORDENADAS DE PRODUCTOS (LÍNEA OFICINA)
   ========================================================================== */

/* --- PÁGINA 1: PRODUCTOS OFICINA A --- */
.borde-of1-top { top: 0%; }
.rotulo-of1-top { top: 1.5%; right: 0.5%; transform: scaleX(0.78); }
.prod-of1-01 { top: 14%; height: 32%; }
.borde-of1-mid { top: 48%; }
.rotulo-of1-mid { top: 49.5%; right: 0.5%; transform: scaleX(0.83); }
.prod-of1-02 { top: 62%; height: 32%; }

/* --- PÁGINA 2: PRODUCTOS OFICINA B (Diseño con separadores) --- */
.borde-of2-top { top: 0%; }
.rotulo-of2-top { top: 1.5%; right: 0.5%; transform: scaleX(0.84); }
.prod-of2-01 { top: 12%; height: 24%; }
.separador-of2-01 { top: 38%; }
.prod-of2-02 { top: 42%; height: 24%; }
.separador-of2-02 { top: 68%; }
.prod-of2-03 { top: 72%; height: 24%; }

/* ==========================================================================
   7. BARRA DE NAVEGACIÓN INFERIOR
   ========================================================================== */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 15; 
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;
}

.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }

/* ==========================================================================
   8. FILTRO MAESTRO PARA PC / WINDOWS
   ========================================================================== */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    
    .rotulo-of1-top { transform: scaleX(0.72); }
    .rotulo-of1-mid { transform: scaleX(0.74); }
    .rotulo-of2-top { transform: scaleX(0.74); top: 1%; }
    .btn-ayuda { position: absolute; top: 8%; z-index: 10; }
}
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo-estatico" src="imagenes/fondos/fondo-linea-oficina.webp" alt="Fondo Oficina">

    <a href="oficina.html" class="btn-ver-lista" title="Ver Lista">
        <img src="imagenes/botones/BtnVerLista.webp" alt="Ver Lista">
    </a>

    <a href="ImagInfoAyuda.html" class="btn-ayuda" title="Ayuda">
        <img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda">
    </a>

    <a href="https://wa.me/573124899581" class="btn-whatsapp" target="_blank" title="Contacto WhatsApp">
        <img src="imagenes/botones/BtnWtsDerecha.webp" alt="WhatsApp">
    </a>

    <div class="visor-productos-scroll">
        
        <section id="oficina-pag1" class="bloque-seccion">
            <div class="borde-contenedor-titulo borde-of1-top"><img src="imagenes/fondos/borde-azul2.webp" alt="Marco"></div>
            <div class="rotulo-titulo rotulo-of1-top">TITULO PRODUCTO OFICINA 1</div>
            <div class="render-producto prod-of1-01"><img src="imagenes/productos/ProductoOficina01.webp" alt="Oficina 01"></div>
            
            <div class="borde-contenedor-titulo borde-of1-mid"><img src="imagenes/fondos/borde-azul2.webp" alt="Marco"></div>
            <div class="rotulo-titulo rotulo-of1-mid">TITULO PRODUCTO OFICINA 2</div>
            <div class="render-producto prod-of1-02"><img src="imagenes/productos/ProductoOficina02.webp" alt="Oficina 02"></div>
        </section>

        <section id="oficina-pag2" class="bloque-seccion">
            <div class="borde-contenedor-titulo borde-of2-top"><img src="imagenes/fondos/borde-azul2.webp" alt="Marco"></div>
            <div class="rotulo-titulo rotulo-of2-top">TITULO GRUPO OFICINA</div>
            
            <div class="render-producto prod-of2-01"><img src="imagenes/productos/ProductoOficina03.webp" alt="Oficina 03"></div>
            <div class="separador-linea separador-of2-01"><img src="imagenes/fondos/separador-azul.webp" alt="Separador"></div>
            
            <div class="render-producto prod-of2-02"><img src="imagenes/productos/ProductoOficina04.webp" alt="Oficina 04"></div>
            <div class="separador-linea separador-of2-02"><img src="imagenes/fondos/separador-azul.webp" alt="Separador"></div>
            
            <div class="render-producto prod-of2-03"><img src="imagenes/productos/ProductoOficina05.webp" alt="Oficina 05"></div>
        </section>

        </div>

    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio" title="Seguridad"></a>
        <a href="oficina.html" class="zona-activa zona-oficina" title="Oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje" title="Marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar" title="Escolar"></a>
    </div>
</div>

</body>
</html>
