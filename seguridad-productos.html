<style>
/* ==========================================================================
   1. CONFIGURACIÓN DEL ESCRITORIO GLOBAL (EL MARCO FÍSICO)
   ========================================================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4; /* Color de la tinta base del fondo */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================================================
   2. EL LIENZO MAESTRO (EL CONTENEDOR)
   ========================================================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size; /* Mide el lienzo para calcular fuentes dinámicas (cqw) */
}

/* Proporciones fijas emulando el visor de escritorio (Aspect Ratio de visualización) */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
}

/* ==========================================================================
   3. CAPAS FIJAS DEL LIENZO (Fondo y Botones Globales que no se mueven)
   ========================================================================== */
.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1; /* Capa 1: Fondo profundo */
}

.btn-indice { 
    position: absolute;
    top: 1.5%;
    left: 2%;
    width: 14%;
    z-index: 10; /* Capa Superior: Siempre accesible */
}

.btn-ayuda { 
    position: absolute;
    top: 1.5%;
    right: 2%;
    width: 4.5%;
    z-index: 10;
}

.btn-whatsapp { 
    position: absolute;
    bottom: 18.5%; /* Situado exactamente arriba de las pegatinas */
    right: 2%;
    width: 24%;
    z-index: 10;
}

.btn-indice img, .btn-ayuda img, .btn-whatsapp img {
    width: 100%;
    display: block;
}

/* ==========================================================================
   4. VISOR DESLIZANTE CON ENCUADRE MAGNÉTICO (EL CUADERNO DE HOJAS)
   ========================================================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%; /* Termina exactamente donde empieza la barra de navegación (100% - 17%) */
    overflow-y: auto;
    scroll-snap-type: y mandatory; /* Activa el imán de encuadre vertical */
    scroll-behavior: smooth;
    z-index: 5; /* Capa Intermedia: Por encima del fondo, por debajo de los botones */
}

/* Ocultar barra de scroll manteniendo funcionalidad */
.visor-productos-scroll::-webkit-scrollbar {
    width: 0px;
    background: transparent;
}

/* ==========================================================================
   5. REGLAS GRÁFICAS E INDEPENDIENTES PARA CADA HOJA DEL LIENZO
   ========================================================================== */
.bloque-seccion {
    position: relative; /* Convierte cada hoja en un sub-lienzo de coordenadas absolutas */
    width: 100%;
    height: 100%; /* Obliga a la hoja a calzar exactamente en el visor de 83% */
    scroll-snap-align: start; /* Punto de anclaje del imán al inicio de la hoja */
    flex-shrink: 0;
    overflow: hidden; /* Corta y oculta cualquier trazo sobrante para evitar que se asome abajo */
}

/* ==========================================================================
   6. LIBRERÍA DE COMPONENTES GRÁFICOS (Moldes Base)
   ========================================================================== */
.borde-contenedor-titulo {
    position: absolute;
    right: 0; /* Clavado en la pared derecha */
    height: auto;
    z-index: 6;
}

.borde-contenedor-titulo img {
    width: 100%;
    display: block;
}

.separador-linea {
    position: absolute;
    left: 5%;
    width: 90%;
    height: auto;
    z-index: 6;
}

.separador-linea img {
    width: 100%;
    display: block;
}

.render-producto {
    position: absolute;
    left: 5%;
    width: 90%;
    z-index: 7;
    display: flex;
    justify-content: center;
    align-items: center;
}

.render-producto img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ETIQUETA O CALIGRAFÍA (ROTULACIÓN): Ajustable individualmente en escala X */
.rotulo-titulo {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 6.8cqw;
    z-index: 8;
    pointer-events: none;
    text-align: right;
    white-space: nowrap;
    transform-origin: right center; /* Ancla el encogimiento a la derecha */
}

/* ==========================================================================
   7. COORDENADAS ARTÍSTICAS DE PRECISIÓN (PÁGINA POR PÁGINA)
   ========================================================================== */

/* --------------------------------------------------------------------------
   PÁGINA 1: CONTADORES (2 Productos, 2 Títulos Largos, 1 Separador)
   -------------------------------------------------------------------------- */

.rotulo-p1-top { top: 0.5%; right: 3%; transform: scaleX(0.70); }

.borde-p1-mid { top: 48%; width: 75%; }

.prod-p3-fuerte { top: 56%; height: 35%; }

/* --------------------------------------------------------------------------
   PÁGINA 4: RELOJES (2 Productos, 2 Títulos Doble Párrafo, 1 Separador)
   -------------------------------------------------------------------------- */
.borde-p4-top { top: 0%; width: 85%; }
.rotulo-p4-top { top: 0.2%; right: 3%; font-size: 5.5cqw; line-height: 1.1; transform: scaleX(0.80); text-align: right; }

/* --------------------------------------------------------------------------
   PÁGINA 5: PROTECTOR DE CHEQUES (1 Producto Grande, 1 Título Largo)

/* ==========================================================================
   8. BARRA DE NAVEGACIÓN INFERIOR (FIJA EN LA BASE DEL CONTENEDOR)
   ========================================================================== */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 15; /* Por encima de todo el lienzo deslizable */

.zona-activa {

.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
