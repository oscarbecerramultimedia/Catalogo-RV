<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;                     /* Elimina el margen externo del papel */
    padding: 0;                    /* Elimina el espacio interno del marco */
    width: 100%;                   /* Ajusta el ancho total de la zona de dibujo */
    height: 100dvh;                /* Ajusta la altura total de la zona de dibujo */
    overflow: hidden;              /* Recorta y oculta cualquier trazo que se salga del papel */
    background: #73A9E4;           /* Color de la tinta de fondo del escritorio */
    display: flex;                 /* Activa la regla de alineación técnica */
    justify-content: center;       /* Centra los elementos horizontalmente */
    align-items: center;           /* Centra los elementos verticalmente */
}

/* ==========================================
   EL LIENZO PRINCIPAL
   ========================================== */
.contenedor {
    position: relative;            /* Define el lienzo base para trazar coordenadas XYZ */
    width: 100vw;                  /* Ancho del lienzo al 100% de la visual */
    height: 100dvh;                /* Alto del lienzo al 100% de la visual */
    overflow: hidden;              /* Enmascara elementos fuera de los bordes del lienzo */
    container-type: size;          /* Mide el ancho y alto del lienzo para calcular escalas relativas */
}

/* ==========================================
   AJUSTE DE PROPORCIÓN PARA ESCRITORIO (WINDOWS)
   ========================================== */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;            /* Mantiene el alto total en la pantalla del monitor */
        width: calc(100dvh * 540 / 1200); /* Ajusta el ancho aplicando la proporción aurea del diseño original */
        max-width: 100vw;          /* Restringe el ancho máximo al límite físico de la pantalla */
        box-shadow: 0 0 15px rgba(0,0,0,0.2); /* Dibuja una sombra proyectada alrededor del marco */
    }
}

/* ==========================================
   CAPA DE FONDO MAESTRA
   ========================================== */
.fondo {
    position: absolute;            /* Clava el elemento en coordenadas fijas */
    inset: 0;                      /* Expande los bordes a los cuatro límites del lienzo */
    width: 100%;
    height: 100%;
    object-fit: fill;              /* Estira el dibujo de fondo para no dejar vacíos */
    z-index: 1;                    /* Capa 1: Fondo de la pila (papel tapiz) */
}

/* ==========================================
   BOTONES INTERACTIVOS GLOBALES
   ========================================== */
.indice { 
    position: absolute;            /* Clava el botón sobre el lienzo */
    top: 1%;                       /* Cota Y: Distancia desde el techo */
    left: 1%;                      /* Cota X: Distancia desde la pared izquierda */
    width: 14%;                    /* Escala del plano del botón */
    z-index: 5;                    /* Capa 5: Al frente para recibir clics */
}

.ayuda { 
    position: absolute;
    top: 5.5%;                     /* Cota Y: Debajo del índice */
    right: 1.5%;                   /* Cota X: Distancia desde la pared derecha */
    width: 4.5%;                   
    z-index: 5;
}

.whatsapp { 
    position: absolute;
    bottom: 18.5%;                 /* Cota Y: Posicionado justo sobre el límite de las pegatinas (17%) */
    right: 1%;
    width: 24%;
    z-index: 5;
}

.indice img, .ayuda img, .whatsapp img { 
    width: 100%;                   /* Obliga al gráfico a ocupar exactamente su marco delimitador */
    display: block;
}

/* ==========================================
   VISOR DESLIZANTE (LA CINTA DE PÁGINAS)
   ========================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;                        /* Inicia exactamente en el techo del lienzo */
    left: 0;
    width: 100%;
    height: 83%;                   /* GEOMETRÍA EXACTA: 100% total - 17% de pegatinas = 83% libre. Evita solapamiento. */
    overflow-y: auto;              /* Habilita la rueda de desplazamiento vertical */
    scroll-snap-type: y mandatory; /* Activa el riel magnético vertical para forzar encajes exactos */
    scroll-behavior: smooth;       /* Transición fluida al saltar mediante anclas (índice) */
    z-index: 3;                    /* Capa 3: Sobre el fondo, debajo de los botones */
    scrollbar-width: none;         /* Oculta la barra de desplazamiento en Firefox para estética limpia */
}
.visor-productos-scroll::-webkit-scrollbar {
    display: none;                 /* Oculta la barra de desplazamiento en Chrome/Safari */
}

/* ==========================================
   HOJA DE SECCIÓN (CADA PÁGINA INDIVIDUAL)
   ========================================== */
.bloque-seccion {
    width: 100%;                   /* La hoja ocupa todo el ancho del visor */
    height: 100%;                  /* La hoja ocupa el 100% del alto del visor (que es el 83% del lienzo). Corte exacto. */
    scroll-snap-align: start;      /* Punto de anclaje magnético en el borde superior de cada hoja */
    scroll-snap-stop: always;      /* Fuerza el imán a frenar en cada hoja, evita saltar dos de largo */
    position: relative;            /* Define el punto 0,0 interno para las coordenadas de esta hoja */
    display: flex;
    flex-direction: column;        /* Apila los elementos internos de arriba hacia abajo */
    overflow: hidden;              /* Corta cualquier gráfico que intente invadir la hoja siguiente */
}

/* ==========================================
   ROTULACIÓN Y MARCOS DECORATIVOS (TÍTULOS DERECHOS)
   ========================================== */
.grupo-titulo {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: flex-end;     /* Empuja todo el bloque (marco y texto) contra la pared derecha */
    align-items: center;           /* Alinea verticalmente el texto con el centro del marco azul */
}

/* Variantes de distancia vertical (Cotas Y) para posicionar títulos en la hoja */
.titulo-top { margin-top: 3%; }    /* Título que va en la parte superior de la hoja */
.titulo-mid { margin-top: 5%; }    /* Título separador para el segundo producto en la misma hoja */

.grafico-borde {
    position: absolute;
    left: 0;                       /* Ancla la imagen decorativa a la izquierda */
    width: 100%;                   /* Extiende la línea azul de lado a lado */
    z-index: 1;                    /* Coloca la franja azul detrás del texto */
}

.texto-rotulo {
    position: relative;
    z-index: 2;                    /* Coloca la tinta de las letras por encima del marco azul */
    color: #1a4d8c;                /* Tinta azul institucional */
    font-family: sans-serif;
    font-weight: bold;
    text-align: right;             /* Justifica la caligrafía a la derecha */
    padding-right: 4%;             /* Margen interno para que la letra no toque el borde de la pantalla */
    max-width: 60%;                /* Límite de la caja de texto. Si el título es muy largo, genera un salto de párrafo automático */
    line-height: 1.1;              /* Interlineado ajustado para títulos de doble párrafo */
}

/* Control de escala de caligrafía según el tipo de título */
.texto-corto { font-size: 6.5cqw; } /* Escala mayor para textos breves ("CAJA FUERTE") */
.texto-largo { font-size: 5cqw; }   /* Escala menor para textos extendidos ("RELOJ CONTROL DE PERSONAL") */

/* ==========================================
   COORDENADAS DE RENDER DE PRODUCTO
   ========================================== */
.producto-render {
    width: 100%;
    flex-grow: 1;                  /* Absorbe el espacio sobrante en la hoja para centrar la imagen */
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}

.producto-render img {
    max-width: 85%;                /* Limita el ancho del producto para mantener un área de respiro */
    max-height: 90%;               /* Limita el alto para que no colisione con los títulos */
    object-fit: contain;           /* Escala la foto proporcionalmente sin deformar la perspectiva */
}

/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR (PEGATINAS)
   ========================================== */
.barra-navegacion-unica { 
    position: absolute;
    bottom: 0;                     /* Clavado en el suelo del lienzo (Cota Y = 0) */
    left: 0;
    width: 100%;
    height: 17%;                   /* Cota Z exacta complementaria al 83% del visor */
    z-index: 4;                    /* Plano por encima de la cinta de productos */
}

.tira-pegatinas-img { 
    width: 100%;
    height: 100%;
    object-fit: fill;              /* Estira la tira gráfica ocupando todo su bloque */
    display: block;
}

.zona-activa { 
    position: absolute;
    top: 0;
    height: 100%;                  /* Extiende la zona invisible de clic al alto total de la barra */
}

/* Cuadrantes matemáticos para mapeo de enlaces (Hotspots) */
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
