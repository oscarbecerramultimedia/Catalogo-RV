<head>

<title>Productos de Seguridad y Biométricos</title>

<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================
   EL LIENZO PRINCIPAL (MARCO DELIMITADOR)
   ========================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

/* ==========================================
   CAPA DE FONDO MAESTRA
   ========================================== */
.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* ==========================================
   BOTONES INTERACTIVOS GLOBALES (COORDENADAS FIJAS)
   ========================================== */
.indice { 
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 5;
}
.ayuda { 
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 5;
}
.whatsapp { 
    position: absolute;
    bottom: 18.5%;
    right: 1%;
    width: 24%;
    z-index: 5;
}
.indice img, .ayuda img, .whatsapp img { 
    width: 100%;
    display: block;
}

/* ==========================================
   VISOR DESLIZANTE (LA CINTA DE PÁGINAS)
   ========================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;                        /* Inicia al ras del techo */
    left: 0;
    width: 100%;
    height: 83%;                   /* Deja el 17% inferior libre para pegatinas */
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    z-index: 3;
    scrollbar-width: none;
}
.visor-productos-scroll::-webkit-scrollbar {
    display: none;
}

/* ==========================================
   HOJA DE SECCIÓN (PLANO DE CORTE PARA CADA PÁGINA)
   ========================================== */
.bloque-seccion {
    width: 100%;
    height: 100%;                  /* Ocupa el 100% del visor (83% total de pantalla) */
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;            /* Define el punto 0,0 para coordenadas X,Y de esta hoja */
    overflow: hidden;              /* MÁSCARA: Corta cualquier elemento que sobresalga (adiós sangrado) */
}

/* ==========================================
   ELEMENTOS DECORATIVOS (CONTROL INDEPENDIENTE)
   Modifica "top" para subir o bajar las líneas azules
   ========================================== */
.borde-azul1 {
    position: absolute;
    top: 2%;                       /* Cota Y de la franja superior */
    left: 0;
    width: 100%;
    z-index: 1;
}
.borde-azul2 {
    position: absolute;
    top: 48%;                      /* Cota Y de la franja divisoria inferior */
    left: 0;
    width: 100%;
    z-index: 1;
}
.borde-azul3 {
    position: absolute;
    top: 52%;                      /* Cota Y alternativa si requieres una tercera franja */
    left: 0;
    width: 100%;
    z-index: 1;
}
.separador-azul {
    position: absolute;
    top: 45%;                      /* Cota Y para una línea de separación simple */
    left: 10%;
    width: 80%;
    z-index: 1;
}

/* ==========================================
   CAJAS DE TEXTO CON ASPECT RATIO FORZADO
   Mueves "top" para alinear con los bordes decorativos
   ========================================== */
.caja-texto-arriba {
    position: absolute;
    top: 2%;                       /* Alinea con borde-azul1 */
    right: 0;
    width: 70%;                    /* Cota X: Ancho de la caja */
    aspect-ratio: 16 / 3;          /* FORZA LA PROPORCIÓN GEOMÉTRICA */
    display: flex;
    justify-content: flex-end;
    align-items: center;
    z-index: 2;
    padding-right: 4%;
}
.caja-texto-abajo {
    position: absolute;
    top: 48%;                      /* Alinea con borde-azul2 o 3 */
    right: 0;
    width: 70%;
    aspect-ratio: 16 / 3;          /* FORZA LA PROPORCIÓN GEOMÉTRICA */
    display: flex;
    justify-content: flex-end;
    align-items: center;
    z-index: 2;
    padding-right: 4%;
}

.texto-rotulo {
    color: #051020;                /* Azul muy oscuro/casi negro */
    font-family: sans-serif;
    font-weight: bold;
    text-align: right;
    line-height: 1.1;
}
.texto-corto { font-size: 6.5cqw; }
.texto-largo { font-size: 4.8cqw; }

/* ==========================================
   RENDERS DE PRODUCTO (CONTROL ABSOLUTO)
   Reduce el % de "top" para subir los objetos a voluntad
   ========================================== */
.producto-render-uno {
    position: absolute;
    top: 13%;                      /* COTA Y: Disminuye este número para subir el producto 1 */
    left: 0;
    width: 100%;                   
    height: 33%;                   /* Volumen máximo vertical del render 1 */
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
}
.producto-render-dos {
    position: absolute;
    top: 59%;                      /* COTA Y: Disminuye este número para subir el producto 2 */
    left: 0;
    width: 100%;
    height: 33%;                   /* Volumen máximo vertical del render 2 */
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
}
.producto-render-uno img, .producto-render-dos img {
    max-width: 85%;
    max-height: 100%;
    object-fit: contain;
}

/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR (PEGATINAS)
   ========================================== */
.barra-navegacion-unica { 
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}
.tira-pegatinas-img { 
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}
.zona-activa { 
    position: absolute;
    top: 0;
    height: 100%;
}
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
