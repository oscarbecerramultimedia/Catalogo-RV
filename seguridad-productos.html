<!DOCTYPE html>

<style>
/* ==========================================================================
   1. CONFIGURACIÓN DEL ESCRITORIO GLOBAL (EL MARCO FÍSICO)
   ========================================================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4; /* Color de la tinta base del fondo */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================================================
   2. EL LIENZO MAESTRO (EL CONTENEDOR)
   ========================================================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
}

/* ==========================================================================
   3. CAPAS FIJAS DEL LIENZO (Fondo y Botones Globales)
   ========================================================================== */
.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1; 
}

.btn-ver-lista { 
    position: absolute;
    top: 1.5%;
    left: 2%;
    width: 14%;
    z-index: 10; 
}

/* GUÍA PARA DIBUJANTES: 'top: 16%' baja el icono para esquivar títulos grandes */
.btn-ayuda { 
    position: absolute;
    top: 8%; 
    right: 0.5%;
    width: 4.5%;
    z-index: 10;
}

/* GUÍA PARA DIBUJANTES: 'top: 55%' lo ubica justo por debajo de la mitad */
.btn-whatsapp { 
    position: absolute;
    top: 50%; 
    right: 0.5%;
    width: 18%;
    z-index: 10;
}

.btn-ver-lista img, .btn-ayuda img, .btn-whatsapp img {
    width: 100%;
    display: block;
}

/* ==========================================================================
   4. VISOR DESLIZANTE CON ENCUADRE MAGNÉTICO
   ========================================================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%; 
    overflow-y: auto;
    scroll-snap-type: y mandatory; 
    scroll-behavior: smooth;
    z-index: 5; 
}

.visor-productos-scroll::-webkit-scrollbar {
    width: 0px;
    background: transparent;
}

.bloque-seccion {
    position: relative; 
    width: 100%;
    height: 100%; 
    scroll-snap-align: start; 
    flex-shrink: 0;
    overflow: hidden; 
}

/* ==========================================================================
   5. LIBRERÍA DE COMPONENTES GRÁFICOS (Moldes Base)
   ========================================================================== */
/* GUÍA: 'width: 100%' fuerza al gráfico a ocupar todo el ancho, escalando uniformemente */
.borde-contenedor-titulo {
    position: absolute;
    right: 0; 
    width: 100%; 
    height: auto;
    z-index: 6;
}

.borde-contenedor-titulo img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    object-position: right top;
}

.separador-linea {
    position: absolute;
    left: 5%;
    width: 90%;
    height: auto;
    z-index: 6;
}

.separador-linea img {
    width: 100%;
    display: block;
}

.render-producto {
    position: absolute;
    left: 5%;
    width: 90%;
    z-index: 7;
    display: flex;
    justify-content: center;
    align-items: center;
}

.render-producto img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ROTULACIÓN: Ajustable individualmente en escala X para apretar el texto */
.rotulo-titulo {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 6.8cqw;
    z-index: 8;
    pointer-events: none;
    text-align: right;
    white-space: nowrap;
    transform-origin: right center; 
}

/* ==========================================================================
   6. COORDENADAS ARTÍSTICAS DE PRECISIÓN (PÁGINA POR PÁGINA)
   ========================================================================== */

/* --- PÁGINA 1: CONTADORES (Sin separador intermedio) --- */
.borde-p1-top { top: 0%; }
.rotulo-p1-top { top: 1.5%; right: 4%; transform: scaleX(0.70); } /* Ajusta scaleX para encoger texto */

.prod-p1-mnds { top: 14%; height: 32%; }

.borde-p1-mid { top: 48%; }
.rotulo-p1-mid { top: 49.5%; right: 4%; transform: scaleX(0.70); }

.prod-p1-bllts { top: 62%; height: 32%; }

/* --- PÁGINA 2: DETECTORES (Con separadores porque no hay títulos en medio) --- */
.borde-p2-top { top: 0%; }
.rotulo-p2-top { top: 1.5%; right: 4%; transform: scaleX(0.72); }

.prod-p2-det01 { top: 12%; height: 24%; }
.separador-p2-01 { top: 38%; } /* Mueve este % para subir o bajar la línea */

.prod-p2-det02 { top: 42%; height: 24%; }
.separador-p2-02 { top: 68%; } /* Mueve este % para subir o bajar la línea */

.prod-p2-det03 { top: 72%; height: 24%; }

/* --- PÁGINA 3: CAJAS (Sin separador intermedio) --- */
.borde-p3-top { top: 0%; }
.rotulo-p3-top { top: 1.5%; right: 4%; transform: scaleX(0.70); }

.prod-p3-menor { top: 14%; height: 32%; }

.borde-p3-mid { top: 48%; }
.rotulo-p3-mid { top: 49.5%; right: 4%; transform: scaleX(0.85); }

.prod-p3-fuerte { top: 62%; height: 32%; }

/* --- PÁGINA 4: RELOJES (Doble título, sin separador) --- */
.borde-p4-top { top: 0%; }
/* GUÍA: Modifica font-size para títulos de dos renglones */
.rotulo-p4-top { top: 1%; right: 4%; font-size: 5.5cqw; line-height: 1.1; transform: scaleX(0.80); }

.prod-p4-pers { top: 16%; height: 28%; }

.borde-p4-mid { top: 48%; }
.rotulo-p4-mid { top: 49%; right: 4%; font-size: 5.2cqw; line-height: 1.1; transform: scaleX(0.78); }

.prod-p4-corr { top: 64%; height: 28%; }

/* --- PÁGINA 5: PROTECTOR DE CHEQUES --- */
.borde-p5-top { top: 0%; }
.rotulo-p5-top { top: 1.5%; right: 4%; transform: scaleX(0.72); }

.prod-p5-cheq { top: 18%; height: 60%; } 

/* --- PÁGINA 6: DESTRUCTORAS (Con separador) --- */
.borde-p6-top { top: 0%; }
.rotulo-p6-top { top: 1.5%; right: 0.5%; transform: scaleX(0.64); }

.prod-p6-docs01 { top: 14%; height: 33%; }
.separador-p6-mid { top: 48%; }
.prod-p6-docs02 { top: 54%; height: 34%; }

/* ==========================================================================
   7. BARRA DE NAVEGACIÓN INFERIOR
   ========================================================================== */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 15; 
}

.tira-pegatinas-img {

    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {

    height: 100%;
    cursor: pointer;

.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
