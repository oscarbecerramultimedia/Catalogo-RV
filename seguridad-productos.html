<style>
/* ========================================================
   1. CONFIGURACIÓN DEL LIENZO (PANTALLA PRINCIPAL)
   ======================================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden; /* Evita que la pantalla entera haga scroll */
    background: #73A9E4;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* El marco que simula la pantalla del celular (Frame Fijo) */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); /* Mantiene la proporción en PC */
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; /* Estira la imagen de fondo para cubrir todo */
    z-index: 1;       /* El nivel más bajo, al fondo */
}

/* ========================================================
   2. EL VISOR DESLIZANTE (LA CAJA DEL CAMPO MAGNÉTICO)
   ======================================================== */
/* Esta es la caja que contiene todas las "fichas" y permite deslizar */
.visor-productos-scroll {
    position: absolute;
    top: 0;                       /* INICIA DESDE ARRIBA COMO PEDISTE */
    left: 5%;
    width: 90%;
    height: 83%;                  /* DEJA EL 17% INFERIOR PARA LOS BOTONES */
    overflow-y: scroll !important;
    scroll-snap-type: y mandatory; /* ACTIVA EL CAMPO MAGNÉTICO (y = vertical, mandatory = salto obligatorio) */
    scroll-behavior: smooth;       /* Hace que el deslizamiento sea suave */
    z-index: 3;
    padding-top: 20px;            /* Espacio interno superior */
    padding-right: 5px;
    box-sizing: border-box;
}

/* Diseño de la barrita lateral para arrastrar */
.visor-productos-scroll::-webkit-scrollbar {
    width: 4px;
    display: block !important;
}
.visor-productos-scroll::-webkit-scrollbar-thumb {
    background-color: rgba(0, 255, 255, 0.35);
    border-radius: 4px;
}

/* ========================================================
   3. LA FICHA DE CADA PÁGINA (EL IMÁN)
   ======================================================== */
/* Cada <section> es una "página" que el visor atrapará */
.ficha-pagina {
    position: relative;
    width: 100%;
    height: 100%;                 /* Ocupa el 100% de la altura visible del visor */
    scroll-snap-align: start;     /* LE DICE AL IMÁN: "Atrapa esta página desde su inicio (arriba)" */
    flex-shrink: 0;
    overflow: hidden;
}

/* ========================================================
   4. GUÍA DE REFERENCIA: POSICIÓN DE LOS BORDES DECORATIVOS
   ======================================================== */
.borde-azul-decorativo {
    position: absolute;
    width: 100%;
    height: auto;
    z-index: 4;
    left: 0;
}

/* 👉 GUÍA: Cambia estos porcentajes si quieres subir o bajar las líneas azules */
.pos-top { top: 3%; }  /* Línea azul superior (Acercado a 0% para subirlo como en Imagen 2) */
.pos-mid { top: 48%; } /* Línea azul del medio (separador) */

/* ========================================================
   5. GUÍA DE REFERENCIA: ROTULACIÓN DE LOS TÍTULOS
   ======================================================== */
.texto-titulo-producto {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 7.5cqw;
    z-index: 5;
    pointer-events: none;
    text-align: right;            /* JUSTIFICADO A LA DERECHA COMO PEDISTE */
    white-space: nowrap;
    transform-origin: right center;
    right: 2%;                    /* Pegado a 2% del borde derecho */
}

/* 👉 GUÍA: Estos valores de 'top' deben ser casi iguales a los de pos-top y pos-mid para que el texto encaje en la línea */
.tit-top { 
    top: 3.5%; 
    transform: scaleX(0.70); /* Comprime el texto un poco a lo ancho para que quepa */
}
.tit-mid { 
    top: 48.5%; 
    transform: scaleX(0.72); 
}

/* Ajuste de compresión de texto si se ve en PC */
@media (min-width: 768px) {
    .tit-top { transform: scaleX(0.58); }
    .tit-mid { transform: scaleX(0.64); }
}

/* ========================================================
   6. GUÍA DE REFERENCIA: POSICIÓN DE LOS PRODUCTOS
   ======================================================== */
.render-contenedor {
    position: absolute;
    left: 0;
    width: 100%;
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 👉 GUÍA: Controla a qué altura (top) y qué tan grande (height) se ve la imagen del producto */
.prod-unico { top: 15%; height: 65%; }          /* Para cuando hay 1 solo producto en la ficha */

.prod-doble-superior { top: 12%; height: 32%; } /* El producto de ARRIBA cuando hay 2 */
.prod-doble-inferior { top: 56%; height: 32%; } /* El producto de ABAJO cuando hay 2 */

/* Para la ficha de detectores que tiene 3 productos */
.prod-triple-1 { top: 12%; height: 23%; }
.prod-triple-2 { top: 38%; height: 23%; }
.prod-triple-3 { top: 65%; height: 23%; }

.render-contenedor img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; /* Evita que la imagen del producto se deforme */
}

/* ========================================================
   7. BOTONES FLOTANTES E INTERFAZ INFERIOR
   ======================================================== */
.btn-indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 6; /* Capa superior para que sea clickeable siempre */
}

.btn-ayuda {
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 6;
}

.whatsapp {
    position: absolute;
    bottom: 18%;                  
    right: 1%;
    width: 24%;
    z-index: 6;
}

/* Barra inferior de navegación (Tira de pegatinas) */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 6;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

/* Zonas invisibles encima de las pegatinas para poder hacer clic */
.zona-activa { position: absolute; top: 0; height: 100%; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }

.btn-indice img, .btn-ayuda img, .whatsapp img { width: 100%; display: block; }
</style>
</head>
