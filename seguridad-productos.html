<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Proporcional</title>

<style>
/* ==========================================
   RESET Y CAPA EXTERIOR (PC y Android)
   ========================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    background: #202020;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* ==========================================
   EL CONTENEDOR ORIGINAL (Bloqueo de Aspect Ratio)
   ========================================== */
.contenedor-principal {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    /* Mantiene la misma proporción visual en cualquier pantalla */
    max-width: calc(100vh * 540 / 1200); 
    aspect-ratio: 540 / 1200;
    background: #73A9E4;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Fondo general */
.imagen-fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* ==========================================
   ZONA DE CONTENIDO SCROLLABLE
   ========================================== */
.zona-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%;                   /* Deja el 17% libre para las pegatinas abajo */
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    z-index: 2;
    scrollbar-width: none;
}
.zona-scroll::-webkit-scrollbar {
    display: none;
}

/* Las páginas del catálogo */
.pagina {
    width: 100%;
    height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
}

/* ==========================================
   ELEMENTOS FIJOS (Botones e Interfaz)
   ========================================== */
.btn-ver-lista { position: absolute; top: 2%; left: 3%; width: 14%; z-index: 10; }
.btn-ayuda     { position: absolute; top: 2%; right: 3%; width: 6%; z-index: 10; }
.btn-whatsapp  { position: absolute; bottom: 19%; right: 3%; width: 14%; z-index: 10; }

.btn-ver-lista img, .btn-ayuda img, .btn-whatsapp img { 
    width: 100%; 
    display: block; 
}

/* TIRA DE PEGATINAS INFERIOR */
.menu-pegatinas {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 5;
}
.menu-pegatinas img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

/* Zonas táctiles del menú */
.enlace-pegatina { position: absolute; top: 0; height: 100%; }
.p-seguridad { left: 0%;   width: 25%; }
.p-oficina   { left: 25%;  width: 25%; }
.p-marcaje   { left: 50%;  width: 25%; }
.p-escolar   { left: 75%;  width: 25%; }
</style>
</head>

<body>

<div class="contenedor-principal">
    
    <img src="imagenes/fondos/fondo-linea-seguridad.webp" class="imagen-fondo" alt="Fondo">

    <a href="seguridad.html" class="btn-ver-lista"><img src="imagenes/botones/BtnVerLista.webp" alt="Lista"></a>
    <a href="ImagInfoAyuda.html" class="btn-ayuda"><img src="imagenes/botones/BtnAyuda.webp" alt="Ayuda"></a>
    <a href="https://wa.me/573124899581" class="btn-whatsapp" target="_blank"><img src="imagenes/botones/BtnWtsDerecha.webp" alt="WhatsApp"></a>

    <div class="zona-scroll">

        <section class="pagina" id="pag-1">
            </section>

        <section class="pagina" id="pag-2">
            </section>

    </div>

    <div class="menu-pegatinas">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" alt="Menú">
        <a href="seguridad.html" class="enlace-pegatina p-seguridad"></a>
        <a href="oficina.html" class="enlace-pegatina p-oficina"></a>
        <a href="marcaje.html" class="enlace-pegatina p-marcaje"></a>
        <a href="escolar.html" class="enlace-pegatina p-escolar"></a>
    </div>

</div>

</body>
</html>
