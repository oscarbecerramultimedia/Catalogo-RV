<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;                     /* Sin márgenes externos */
    padding: 0;                    /* Sin márgenes internos */
    width: 100%;
    height: 100dvh;
    overflow: hidden;              /* Oculta lo que se desborde de la pantalla principal */
    background: #73A9E4;           /* Color base */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================
   EL LIENZO PRINCIPAL (El marco de tu mesa de luz)
   ========================================== */
.contenedor {
    position: relative;            /* Define el Punto 0,0 para los botones fijos */
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200); /* Proporción áurea de tu diseño original */
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

/* ==========================================
   CAPA DE FONDO MAESTRA (Fija debajo de todo)
   ========================================== */
.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;              /* Estira el fondo sin dejar bordes blancos */
    z-index: 1;                    /* Capa 1: Hasta el fondo */
}

/* ==========================================
   VISOR DESLIZANTE (El riel por donde pasan las páginas)
   ========================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%;                   /* Deja exactamente un 17% libre abajo para las pegatinas */
    overflow-y: auto;              /* Activa la rueda del ratón/dedo */
    scroll-snap-type: y mandatory; /* El imán que obliga a frenar en cada página */
    scroll-behavior: smooth;
    z-index: 3;                    /* Capa 3: Por encima del fondo */
    scrollbar-width: none;         /* Oculta la barra en Firefox */
}
.visor-productos-scroll::-webkit-scrollbar {
    display: none;                 /* Oculta la barra en Chrome/Safari/Edge */
}

/* ==========================================
   HOJA DE CATÁLOGO (Tu nueva mesa de trabajo independiente)
   ========================================== */
.hoja-catalogo {
    width: 100%;
    height: 100%;                  /* Ocupa el 100% del visor (el 83% de la pantalla) */
    scroll-snap-align: start;      /* Punto de frenado del imán (arriba) */
    scroll-snap-stop: always;      /* Fuerza a frenar, evita saltarse páginas */
    position: relative;            /* IMPORTANTE: Crea un nuevo Punto 0,0 interno para esta hoja */
    overflow: hidden;              /* Corta cualquier gráfico que se salga de esta hoja */
}

/* ==========================================
   HERRAMIENTAS DE DIBUJO (Clases para acomodar elementos)
   ========================================== */

/* 1. MÓDULO DE TÍTULOS CON MARCO AZUL */
.bloque-titulo {
    position: absolute;            /* Anclaje libre en la hoja */
    right: 0;                      /* Siempre pegado a la pared derecha */
    width: 100%;
    height: 12%;                   /* Altura estimada del marco. Ajustable si es necesario */
    display: flex;
    justify-content: flex-end;     /* Empuja el texto a la derecha */
    align-items: center;           /* Centra el texto verticalmente con el marco */
    z-index: 4;                    /* Capa 4: Por encima de los productos */
}

.grafico-borde {
    position: absolute;
    right: 0;
    top: 0;                        /* OBLIGATORIO: Como pediste, el gráfico toca el techo del bloque */
    height: 100%;                  /* El gráfico llena la altura del bloque-titulo */
    z-index: 1;                    /* Capa interna: Detrás de las letras */
}

.texto-titulo {
    position: relative;
    z-index: 2;                    /* Capa interna: Letras al frente */
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    text-align: right;
    margin: 0;
    padding-right: 5%;             /* Margen para que no choque con el borde derecho */
    font-size: 5cqw;               /* Tamaño base. Úsalo como estándar */
    transform-origin: right center;/* Si comprimes el texto, se encoge desde la izquierda hacia la derecha */
}

/* 2. PRODUCTOS INDIVIDUALES */
.producto-aislado {
    position: absolute;            /* Anclaje libre */
    left: 50%;                     /* Cota X: Lo manda al centro de la pantalla... */
    transform: translateX(-50%);   /* ...y esto lo centra perfectamente en su propio eje */
    z-index: 3;                    /* Capa 3: Detrás de los títulos, por si se solapan */
    object-fit: contain;           /* Evita que la foto del producto se deforme */
}

/* 3. SEPARADORES CENTRALES */
.separador-central {
    position: absolute;            /* Anclaje libre */
    left: 50%;
    transform: translateX(-50%);   /* Centrado automático exacto */
    width: 60%;                    /* Ancho estándar del separador, ajústalo si lo ves muy largo */
    z-index: 2;                    /* Capa 2: Debajo de los productos */
}

/* ==========================================
   BOTONES FIJOS GLOBALES
   ========================================== */
.btn-indice { position: absolute; top: 1%; left: 1%; width: 14%; z-index: 5; }
.btn-ayuda { position: absolute; top: 7%; right: 1.5%; width: 5%; z-index: 5; }
.btn-whatsapp { position: absolute; bottom: 18.5%; right: 1%; width: 14%; z-index: 5; }
.btn-indice img, .btn-ayuda img, .btn-whatsapp img { width: 100%; display: block; }

/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR (PEGATINAS)
   ========================================== */
.barra-navegacion-unica { 
    position: absolute; bottom: 0; left: 0; width: 100%; height: 17%; z-index: 4; 
}
.tira-pegatinas-img { width: 100%; height: 100%; object-fit: fill; display: block; }
.zona-activa { position: absolute; top: 0; height: 100%; cursor: pointer; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
