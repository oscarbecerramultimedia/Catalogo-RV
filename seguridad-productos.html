<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Interactivo - Seguridad y Biométricos</title>

<style>
/* ========================================================
   1. CONFIGURACIÓN DEL LIENZO (PANTALLA PRINCIPAL)
   ======================================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4;
    display: flex;
    justify-content: center;
    align-items: center;
}

.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    z-index: 1;       
}

/* ========================================================
   2. EL VISOR DESLIZANTE (LA CAJA DEL CAMPO MAGNÉTICO)
   ======================================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;                       /* INICIA DESDE ARRIBA */
    left: 5%;
    width: 90%;
    height: 83%;                  /* DEJA EL 17% INFERIOR LIBRE */
    overflow-y: scroll !important;
    scroll-snap-type: y mandatory; 
    scroll-behavior: smooth;       
    z-index: 3;
    padding-top: 20px;            
    padding-right: 5px;
    box-sizing: border-box;
}

.visor-productos-scroll::-webkit-scrollbar {
    width: 4px;
    display: block !important;
}
.visor-productos-scroll::-webkit-scrollbar-thumb {
    background-color: rgba(0, 255, 255, 0.35);
    border-radius: 4px;
}

/* ========================================================
   3. LA FICHA DE CADA PÁGINA (EL IMÁN)
   ======================================================== */
.ficha-pagina {
    position: relative;
    width: 100%;
    height: 100%;                 
    scroll-snap-align: start;     
    flex-shrink: 0;
    overflow: hidden;
}

/* ========================================================
   4. GUÍA DE REFERENCIA: POSICIÓN DE LOS BORDES DECORATIVOS
   ======================================================== */
.borde-azul-decorativo {
    position: absolute;
    width: 100%;
    height: auto;
    z-index: 4;
    left: 0;
}

/* 👉 CORRECCIÓN APLICADA: Bajamos el top para no chocar con los botones */
.pos-top { top: 10%; }  /* Antes en 3%, ahora en 10% (Despeja la zona superior) */
.pos-mid { top: 50%; }  /* Antes en 48%, lo centramos mejor */

/* ========================================================
   5. GUÍA DE REFERENCIA: ROTULACIÓN DE LOS TÍTULOS
   ======================================================== */
.texto-titulo-producto {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 7.5cqw;
    z-index: 5;
    pointer-events: none;
    text-align: right;            
    white-space: nowrap;
    transform-origin: right center;
    right: 2%;                    
}

/* 👉 CORRECCIÓN APLICADA: Alineados con los nuevos bordes */
.tit-top { 
    top: 10.5%; 
    transform: scaleX(0.70); 
}
.tit-mid { 
    top: 50.5%; 
    transform: scaleX(0.72); 
}

@media (min-width: 768px) {
    .tit-top { transform: scaleX(0.58); }
    .tit-mid { transform: scaleX(0.64); }
}

/* ========================================================
   6. GUÍA DE REFERENCIA: POSICIÓN DE LOS PRODUCTOS
   ======================================================== */
.render-contenedor {
    position: absolute;
    left: 0;
    width: 100%;
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 👉 CORRECCIÓN APLICADA: Comprimimos la altura de los productos y los centramos */
.prod-unico { top: 22%; height: 55%; }          

.prod-doble-superior { top: 16%; height: 28%; } /* Antes top 12% height 32% */
.prod-doble-inferior { top: 56%; height: 28%; } /* Subimos el límite inferior para no pisar a la asistente de WhatsApp */

/* Ajuste para los 3 detectores */
.prod-triple-1 { top: 16%; height: 20%; }
.prod-triple-2 { top: 39%; height: 20%; }
.prod-triple-3 { top: 62%; height: 20%; }

.render-contenedor img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; 
}

/* ========================================================
   7. BOTONES FLOTANTES E INTERFAZ INFERIOR
   ======================================================== */
.btn-indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 6; 
}

.btn-ayuda {
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 6;
}

.whatsapp {
    position: absolute;
    bottom: 18%;                  
    right: 1%;
    width: 24%;
    z-index: 6;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 6;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa { position: absolute; top: 0; height: 100%; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }

.btn-indice img, .btn-ayuda img, .whatsapp img { width: 100%; display: block; }
</style>
</head>
