<!DOCTYPE html>
<html lang="es">

<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #73A9E4;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ==========================================
   EL LIENZO PRINCIPAL (FRAME FIJO)
   ========================================== */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    container-type: size;
}

@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;
        width: calc(100dvh * 540 / 1200);
        max-width: 100vw;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
}

.fondo-estatico {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* ==========================================
   VISOR DESLIZANTE RESTAURADO + EFECTO IMÁN
   ========================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;                       /* Restaurado al original */
    left: 5%;                     /* Restaurado al original */
    width: 90%;                   /* Restaurado al original */
    height: 83%;                  /* Restaurado al original */
    overflow-y: scroll !important;
    scroll-snap-type: y mandatory; /* Mantiene el salto magnético de página completa */
    scroll-behavior: smooth;
    z-index: 3;
    padding-top: 20px;            /* Restaurado al original */
    padding-right: 5px;           /* Restaurado al original */
    box-sizing: border-box;
}

/* Estilos de la barra de scroll originales */
.visor-productos-scroll::-webkit-scrollbar {
    width: 4px;
    display: block !important;
}

.visor-productos-scroll::-webkit-scrollbar-thumb {
    background-color: rgba(0, 255, 255, 0.35);
    border-radius: 4px;
}

/* ==========================================
   ESTRUCTURA DE CADA PÁGINA (FICHA) INDEPENDIENTE
   ========================================== */
.ficha-pagina {
    position: relative;
    width: 100%;
    height: 100%;                 /* Obliga a la sección a medir el 100% de la caja visible */
    scroll-snap-align: start;     /* Alínea el imán al inicio de la caja */
    flex-shrink: 0;
    overflow: hidden;
}

/* ==========================================
   CONTROL DE MARCOS Y DIVISIONES DECORATIVAS
   ========================================== */
.borde-azul-decorativo {
    position: absolute;
    width: 100%;
    height: auto;
    z-index: 4;
    left: 0;
}

/* Se ajustan para no chocar con los botones superiores al restaurar top:0 en la caja madre */
.pos-top { top: 11%; }            
.pos-mid { top: 51%; }            

/* ==========================================
   REGLAS GRÁFICAS PARA ROTULACIÓN DE TÍTULOS
   ========================================== */
.texto-titulo-producto {
    position: absolute;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 7.5cqw;
    z-index: 5;
    pointer-events: none;
    text-align: right;            /* Títulos justificados a la derecha respetado */
    white-space: nowrap;
    transform-origin: right center;
    right: 2%;                    
}

.tit-top { top: 11.5%; transform: scaleX(0.70); }
.tit-mid { top: 51.5%; transform: scaleX(0.72); }

@media (min-width: 768px) {
    .tit-top { transform: scaleX(0.58); }
    .tit-mid { transform: scaleX(0.64); }
}

/* ==========================================
   POSICIONAMIENTO GEOMÉTRICO DE PRODUCTOS
   ========================================== */
.render-contenedor {
    position: absolute;
    left: 0;
    width: 100%;
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Modificadores ajustados a la caja restaurada */
.prod-unico { top: 20%; height: 60%; }
.prod-doble-superior { top: 17%; height: 32%; }
.prod-doble-inferior { top: 57%; height: 32%; }

.prod-triple-1 { top: 16%; height: 23%; }
.prod-triple-2 { top: 40%; height: 23%; }
.prod-triple-3 { top: 66%; height: 23%; }

.render-contenedor img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* ==========================================
   BOTONES E INTERFAZ GLOBAL DEL CONTENEDOR
   ========================================== */
.btn-indice {
    position: absolute;
    top: 1%;
    left: 1%;
    width: 14%;
    z-index: 6;
}

.btn-ayuda {
    position: absolute;
    top: 5.5%;
    right: 1.5%;
    width: 4.5%;
    z-index: 6;
}

.whatsapp {
    position: absolute;
    bottom: 18%;                  
    right: 1%;
    width: 24%;
    z-index: 6;
}

.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 6;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa { position: absolute; top: 0; height: 100%; }
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }

.btn-indice img, .btn-ayuda img, .whatsapp img { width: 100%; display: block; }
</style>
</head>
