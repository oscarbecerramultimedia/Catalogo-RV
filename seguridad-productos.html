<style>
/* ==========================================
   ANCLAJE DE PANTALLA (Windows / Android)
   ========================================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #202020;           /* Fondo oscuro exterior para resaltar el catálogo en PC */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* EL CONTENEDOR ESTRICTO (No permite desbordes laterales) */
.contenedor {
    position: relative;
    width: 100vw;
    height: 100dvh;
    max-width: calc(100dvh * 540 / 1200); /* Relación de aspecto idéntica en Android y PC */
    aspect-ratio: 540 / 1200;
    overflow: hidden;
    background: #73A9E4;
    container-type: size;          /* CREA EL CANDADO: Todo lo interno se mide desde aquí */
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* FONDO DE LA PANTALLA */
.fondo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    z-index: 1;
}

/* VISOR CON FRENO MAGNÉTICO */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 83%;                   /* Deja el 17% libre abajo para las pegatinas fijas */
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    z-index: 3;
    scrollbar-width: none;
}
.visor-productos-scroll::-webkit-scrollbar {
    display: none;
}

/* CADA UNA DE LAS 6 PÁGINAS */
.hoja-catalogo {
    width: 100%;
    height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    overflow: hidden;
}

/* ==========================================
   MARCOS DE TEXTO Y COMPRESIÓN (borde-azul)
   ========================================== */
.bloque-titulo {
    position: absolute;
    right: 0;
    width: 100%;
    height: 11cqh;                 /* Altura basada estrictamente en el contenedor */
    display: flex;
    justify-content: flex-end;
    align-items: center;
    z-index: 4;
}

.grafico-borde {
    position: absolute;
    right: 0;
    top: 0;                        /* REGLA: Gráfico pegado al techo del bloque siempre */
    height: 100%;
    object-fit: contain;
    z-index: 1;
}

.texto-titulo {
    position: relative;
    z-index: 2;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    text-align: right;
    margin: 0;
    padding-right: 6cqw;           /* Separación del borde derecho en unidades de contenedor */
    font-size: 5.2cqw;             /* Tamaño armónico protegido contra pantallas de PC */
    transform-origin: right center;/* Compresión horizontal limpia hacia la derecha */
    white-space: nowrap;
}

/* ==========================================
   PRODUCTOS Y SEPARADORES
   ========================================== */
.producto-aislado {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    object-fit: contain;
}

.separador-central {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);   /* Siempre centrado horizontalmente */
    width: 70cqw;                  /* Ancho del separador controlado */
    z-index: 2;
}

/* ==========================================
   BOTONES GLOBALES FIJOS
   ========================================== */
.btn-lista { position: absolute; top: 1%; left: 2%; width: 14cqw; z-index: 5; }
.btn-ayuda { position: absolute; top: 1%; right: 2%; width: 6cqw; z-index: 5; }
.btn-whatsapp { position: absolute; bottom: 18.5%; right: 2%; width: 14cqw; z-index: 5; }
.btn-lista img, .btn-ayuda img, .btn-whatsapp img { width: 100%; display: block; }

/* BARRA DE PEGATINAS INFERIOR */
.barra-navegacion-unica { 
    position: absolute; bottom: 0; left: 0; width: 100%; height: 17%; z-index: 4; 
}
.tira-pegatinas-img { width: 100%; height: 100%; object-fit: fill; display: block; }
.zona-activa { position: absolute; top: 0; height: 100%; cursor: pointer; }
.zona-seguridad { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
