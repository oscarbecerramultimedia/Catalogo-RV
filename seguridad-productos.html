<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos de Seguridad y Biométricos</title>

<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;                     /* Elimina el margen externo */
    padding: 0;                    /* Elimina el espacio interno */
    width: 100%;                   /* Ajusta el ancho total */
    height: 100dvh;                /* Ajusta la altura total visual */
    overflow: hidden;              /* Oculta lo que desborde la pantalla principal */
    background: #73A9E4;           /* Color base */
    display: flex;                 /* Activa alineación */
    justify-content: center;       /* Centra horizontalmente */
    align-items: center;           /* Centra verticalmente */
}

/* ==========================================
   EL LIENZO PRINCIPAL
   ========================================== */
.contenedor {
    position: relative;            /* Lienzo base para coordenadas */
    width: 100vw;                  /* Ancho al 100% de la visual */
    height: 100dvh;                /* Alto al 100% de la visual */
    overflow: hidden;              /* Recorta elementos fuera del lienzo */
    container-type: size;          /* Mide dimensiones para escalas */
}

/* ==========================================
   AJUSTE DE PROPORCIÓN PARA ESCRITORIO (WINDOWS)
   ========================================== */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;            /* Mantiene alto total */
        width: calc(100dvh * 540 / 1200); /* Proporción fija de dibujo */
        max-width: 100vw;          /* Restringe ancho máximo */
        box-shadow: 0 0 15px rgba(0,0,0,0.2); /* Sombra proyectada */
    }
    .texto-titulo-interno {
        font-size: 20px !important; /* Ajuste fijo de fuente en escritorio */
    }
}

/* ==========================================
   CAPA DE FONDO
   ========================================== */
.fondo {
    position: absolute;            /* Clava el elemento al lienzo */
    inset: 0;                      /* Ajusta a los bordes */
    width: 100%;                   
    height: 100%;                  
    object-fit: fill;              /* Estira sin dejar vacíos */
    z-index: 1;                    /* Capa 1: Fondo de la pila */
}

/* ==========================================
   VISOR DESLIZANTE AMPLIADO
   ========================================== */
.visor-productos-scroll {
    position: absolute;
    top: 0;
    left: 5%;
    width: 90%;
    height: 83%;                   /* Deja espacio para la barra inferior */
    overflow-y: auto !important;   /* Habilita scroll vertical */
    scroll-behavior: smooth;       /* Suaviza el salto entre anclas */
    z-index: 3;                    /* Capa 3: Sobre el fondo */
    padding-top: 20px;
    padding-right: 5px;
    box-sizing: border-box;
}

.visor-productos-scroll::-webkit-scrollbar {
    width: 4px;
    display: block !important;
}

.visor-productos-scroll::-webkit-scrollbar-thumb {
    background-color: rgba(0, 255, 255, 0.35);
    border-radius: 4px;
}

/* ==========================================
   BLOQUES DE SECCIÓN (TAXONOMÍA)
   ========================================== */
.bloque-seccion {
    width: 100%;
    margin-bottom: 30px;           /* Separación entre categorías */
    display: flex;
    flex-direction: column;
    align-items: center;
}

.texto-titulo-interno {
    width: 100%;
    color: #1a4d8c;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 5.5cqw;
    text-align: center;
    margin-bottom: 15px;
    padding-bottom: 5px;
    border-bottom: 2px solid rgba(26, 77, 140, 0.2);
    text-transform: uppercase;
}

.producto-render {
    width: 100%;
    margin-bottom: 10px;
}

.producto-render img {
    width: 100%;
    display: block;
    object-fit: contain;           /* Evita deformar el render del producto */
}

/* ==========================================
   BOTONES FLOTANTES
   ========================================== */
.btn-volver {
    position: absolute;
    top: 2%;
    left: 2%;
    width: 14%;
    z-index: 5;                    /* Capa 5: Al frente */
}

.btn-volver img {
    width: 100%;
    display: block;
}

.whatsapp {
    position: absolute;
    bottom: 18%;                   /* Justo por encima de la barra inferior */
    right: 3%;
    width: 14%;
    z-index: 4;
}

.whatsapp img {
    width: 100%;
    display: block;
}

/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR
   ========================================== */
.barra-navegacion-unica {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 17%;
    z-index: 4;
}

.tira-pegatinas-img {
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
}

.zona-activa {
    position: absolute;
    top: 0;
    height: 100%;
    cursor: pointer;               /* Indica zona clickeable */
}

/* Cuadrantes de navegación */
.zona-inicio { left: 0%; width: 25%; }
.zona-oficina { left: 25%; width: 25%; }
.zona-marcaje { left: 50%; width: 25%; }
.zona-escolar { left: 75%; width: 25%; }
</style>
</head>
<body>

<div class="contenedor">
    <img class="fondo" src="imagenes/fondos/fondo-linea-seguridad.webp" alt="Fondo">
    
    <a href="seguridad.html" class="btn-volver">
        <img src="imagenes/botones/Btn-indice.webp" alt="Volver">
    </a>
    
    <div class="visor-productos-scroll">
        
        <section id="contadores" class="bloque-seccion">
            <div class="texto-titulo-interno">Contador De Monedas y Billetes</div>
            <div class="producto-render"><img src="imagenes/productos/ConDeMndsZE-101.webp" alt="ZE-101"></div>
            <div class="producto-render"><img src="imagenes/productos/ConDeBlltsZE-102.webp" alt="ZE-102"></div>
        </section>

        <section id="detectores" class="bloque-seccion">
            <div class="texto-titulo-interno">Detector De Billetes</div>
            <div class="producto-render"><img src="imagenes/productos/DetBilletesZE-104.webp" alt="ZE-104"></div>
            <div class="producto-render"><img src="imagenes/productos/DetBilletesZE-105.webp" alt="ZE-105"></div>
            <div class="producto-render"><img src="imagenes/productos/DetBilletesZE-106.webp" alt="ZE-106"></div>
        </section>

        <section id="cajas" class="bloque-seccion">
            <div class="texto-titulo-interno">Caja Menor Metálica y Caja Fuerte</div>
            <div class="producto-render"><img src="imagenes/productos/CajaMenorZE-108.webp" alt="ZE-108"></div>
            <div class="producto-render"><img src="imagenes/productos/CajaFuerte-ZE109.webp" alt="ZE-109"></div>
        </section>

        <section id="relojes" class="bloque-seccion">
            <div class="texto-titulo-interno">Reloj Control De Personal y Correspondencia</div>
            <div class="producto-render"><img src="imagenes/productos/RelojBiometricoZE-110.webp" alt="ZE-110"></div>
            <div class="producto-render"><img src="imagenes/productos/ContadorCorrespondenciaZE-111.webp" alt="ZE-111"></div>
        </section>

        <section id="cheques" class="bloque-seccion">
            <div class="texto-titulo-interno">Protector De Cheques</div>
            <div class="producto-render"><img src="imagenes/productos/Protec-CheqElect-112.webp" alt="ZE-112"></div>
        </section>

        <section id="destructoras" class="bloque-seccion">
            <div class="texto-titulo-interno">Destructora De Documentos</div>
            <div class="producto-render"><img src="imagenes/productos/DestrDocsZE-113.webp" alt="ZE-113"></div>
            <div class="producto-render"><img src="imagenes/productos/DestrDocsZE-114.webp" alt="ZE-114"></div>
        </section>

    </div>

    <a href="https://wa.me/573124899581" class="whatsapp" target="_blank">
        <img src="imagenes/botones/BtnWtsDerecha.webp" alt="WhatsApp">
    </a>

    <div class="barra-navegacion-unica">
        <img src="imagenes/botones/TiraPegatinasCompleta.webp" class="tira-pegatinas-img" alt="Navegación">
        <a href="seguridad.html" class="zona-activa zona-inicio" title="Seguridad"></a>
        <a href="oficina.html" class="zona-activa zona-oficina" title="Oficina"></a>
        <a href="marcaje.html" class="zona-activa zona-marcaje" title="Marcaje"></a>
        <a href="escolar.html" class="zona-activa zona-escolar" title="Escolar"></a>
    </div>
</div>

</body>
</html>
