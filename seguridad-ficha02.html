<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detector de Billetes</title>

<style>
/* ==========================================
   CONFIGURACIÓN GENERAL DEL ESCRITORIO
   ========================================== */
html, body {
    margin: 0;                     /* Elimina el margen externo del papel */
    padding: 0;                    /* Elimina el espacio interno del marco */
    width: 100%;                   /* Ajusta el ancho total de la zona de dibujo */
    height: 100dvh;                /* Ajusta la altura total de la zona de dibujo */
    overflow: hidden;              /* Recorta y oculta cualquier trazo que se salga del papel */
    background: #73A9E4;           /* Color de la tinta de fondo del escritorio */
    display: flex;                 /* Activa la regla de alineación técnica de elementos */
    justify-content: center;       /* Centra los elementos horizontalmente en el escritorio */
    align-items: center;           /* Centra los elementos verticalmente en el escritorio */
}

/* ==========================================
   EL LIENZO PRINCIPAL
   ========================================== */
.contenedor {
    position: relative;            /* Define este bloque como el lienzo base para calcular coordenadas */
    width: 100vw;                  /* Ajusta el ancho del lienzo al 100% de la visual */
    height: 100dvh;                /* Ajusta el alto del lienzo al 100% de la visual */
    overflow: hidden;              /* Recorta todo elemento que desborde los límites del lienzo */
    container-type: inline-size;   /* Mide el ancho del lienzo para graduar escalas tipográficas */
}

/* ==========================================
   AJUSTE DE PROPORCIÓN PARA ESCRITORIO (WINDOWS)
   ========================================== */
@media (min-width: 768px) {
    .contenedor {
        height: 100dvh;            /* Mantiene el alto total en la pantalla del monitor */
        width: calc(100dvh * 540 / 1200); /* Ajusta el ancho aplicando una proporción fija de dibujo */
        max-width: 100vw;          /* Restringe el ancho máximo al límite físico de la pantalla */
        box-shadow: 0 0 15px rgba(0,0,0,0.2); /* Dibuja una sombra proyectada alrededor del lienzo */
    }
}

/* ==========================================
   CAPA DE FONDO
   ========================================== */
.fondo { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    inset: 0;                      /* Ajusta los cuatro bordes para alinearse con los del lienzo */
    width: 100%;                   /* Copia el ancho total del lienzo */
    height: 100%;                  /* Copia la altura total del lienzo */
    object-fit: fill;              /* Estira el dibujo de fondo para cubrir todo el espacio sin dejar vacíos */
    z-index: 1;                    /* Capa 1: Se ubica en el fondo de la pila del dibujo */
}

/* ==========================================
   COORDENADAS DE BOTONES SUPERIORES PERIFÉRICOS
   ========================================== */
.indice { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 1%;                       /* Distancia vertical desde la regla superior del lienzo */
    left: 1%;                      /* Distancia horizontal desde la regla izquierda del lienzo */
    width: 14%;                    /* Ajusta el ancho de la imagen del botón */
    z-index: 5;                    /* Capa 5: Al frente de todo el plano para recibir clics */
}

.ayuda { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 6%;                       /* Distancia vertical desde la regla superior del lienzo */
    right: 1.5%;                   /* Distancia horizontal desde la regla derecha del lienzo */
    width: 4.5%;                   /* Ajusta el ancho de la imagen del botón */
    z-index: 5;                    /* Capa 5: Al frente de todo el plano para recibir clics */
}

.whatsapp { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 42%;                      /* Distancia vertical desde la regla superior del lienzo */
    right: 1%;                     /* Distancia horizontal desde la regla derecha del lienzo */
    width: 24%;                    /* Ajusta el ancho de la imagen del botón */
    z-index: 5;                    /* Capa 5: Al frente de todo el plano para recibir clics */
}

/* ==========================================
   COORDENADAS DE LAS IMÁGENES DE PRODUCTOS
   ========================================== */
.det-ze104 {
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 9.5%;                     /* Distancia vertical desde la regla superior del lienzo */
    left: 5%;                      /* Distancia horizontal desde la regla izquierda del lienzo */
    width: 88%;                    /* Ajusta el ancho del dibujo de la máquina */
    z-index: 3;                    /* Capa 3: Plano intermedio del dibujo */
}
    
.det-ze105 { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 28.5%;                    /* Distancia vertical desde la regla superior del lienzo */
    left: 4.5%;                    /* Distancia horizontal desde la regla izquierda del lienzo */
    width: 88%;                    /* Ajusta el ancho del dibujo de la máquina */
    z-index: 3;                    /* Capa 3: Plano intermedio del dibujo */
}
    
.det-ze106 {
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    top: 55%;                      /* Distancia vertical desde la regla superior del lienzo */
    left: 5%;                      /* Distancia horizontal desde la regla izquierda del lienzo */
    width: 88%;                    /* Ajusta el ancho del dibujo de la máquina */
    z-index: 3;                    /* Capa 3: Plano intermedio del dibujo */
}
    
.det-ze104 img,
.det-ze105 img,
.det-ze106 img {
    width: 100%;                   /* Fija el ancho de la imagen interna al 100% de su contenedor */
    display: block;                /* Quita rebabas e imperfecciones de alineación en el bloque */
}

/* ==========================================
   MARCOS Y DIVISIONES DECORATIVAS
   ========================================== */
.borde-azul { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    width: 100%;                   /* Ajusta el ancho de la línea de lado a lado del lienzo */
    height: auto;                  /* Calcula el alto automáticamente para no deformar el trazo */
    z-index: 4;                    /* Capa 4: Plano por encima de los productos */
    left: 0;                       /* Alinea el inicio del trazo con el borde izquierdo */
}

.borde-top { 
    top: 0%;                       /* Clava Borde azul en el extremo superior */
}

.separador-azul { 
    position: absolute;            /* Clava el elemento en coordenadas fijas dentro del lienzo */
    width: 100%;                   /* Ajusta el ancho de la línea de lado a lado del lienzo */
    height: auto;                  /* Calcula el alto automáticamente para no deformar el trazo */
    z-index: 4;                    /* Capa 4: Plano por encima de los productos */
    left: 0;                       /* Alinea el inicio del trazo con el borde izquierdo */
}
   
.separador-top { 
    top: 33%;                      /* Clava la línea azul en la sección superior del lienzo */
}
   
.separador-mid { 
    top: 60%;                      /* Clava la línea azul en la sección media del lienzo */
}

.separador-bot { 
    top: 90%;                      /* Clava la línea azul en la sección inferior del lienzo */
}

/* ==========================================
   REGLAS GRÁFICAS BASE PARA EL TEXTO
   ========================================== */
.texto-detector {
    position: absolute;            /* Clava el texto en coordenadas fijas dentro del lienzo */
    color: #1a4d8c;                /* Color del pigmento o tinta de las letras */
    font-family: sans-serif;       /* Tipo de caligrafía o fuente lineal limpia */
    font-weight: bold;             /* Aplica trazo grueso (negrita) a las letras */
    font-size: 8cqw;               /* Ajusta el alto general de las letras según la escala del lienzo */
    z-index: 5;                    /* Capa 5: Se dibuja en el plano superior, al frente de todo */
    pointer-events: none;          /* El texto actúa como dibujo fantasma; no bloquea trazos inferiores */
    text-align: right;             /* Justifica o alinea la rotulación hacia el lado derecho */
    white-space: nowrap;           /* Prohíbe el salto de renglón; mantiene el texto en una sola línea */
    transform-origin: right center; /* Clava el punto de anclaje en el extremo derecho antes de deformar */
    top: 0.5%;                     /* Distancia vertical desde el techo del lienzo en Android */
    right: 2%;                     /* Distancia horizontal desde el marco derecho */
    transform: scaleX(0.67);       /* Gradúa el ancho: comprime horizontalmente al 67% en Android */
}

/* ==========================================
   AJUSTES Y GRADUACIÓN PARA ANCHOS EN WINDOWS
   ========================================== */
@media (min-width: 768px) {
    .texto-detector {
        top: 0.5%;                 /* Mantiene la distancia vertical en el escritorio de Windows */
        right: 2%;                 /* Mantiene la distancia horizontal en el escritorio de Windows */
        transform: scaleX(0.57);   /* Ajusta ancho en Windows: comprime más horizontalmente (al 57%) */
    }
}
   
/* ==========================================
   BARRA DE NAVEGACIÓN INFERIOR Y DIVISIONES
   ========================================== */
.barra-navegacion-unica { 
    position: absolute;            /* Clava la barra en coordenadas fijas dentro del lienzo */
    bottom: 0;                     /* Alínea y clava la base del dibujo con el suelo del lienzo */
    left: 0;                       /* Alínea el inicio con la pared izquierda del lienzo */
    width: 100%;                   /* Extiende el ancho al 100% del lienzo */
    height: 17%;                   /* Ajusta el alto ocupando el 17% inferior del espacio */
    z-index: 4;                    /* Capa 4: Plano intermedio-alto */
}

.tira-pegatinas-img { 
    width: 100%;                   /* Ajusta la imagen al ancho total de su caja */
    height: 100%;                  /* Ajusta la imagen a la altura total de su caja */
    object-fit: fill;              /* Adapta el dibujo de la tira sin dejar márgenes vacíos */
    display: block;                /* Elimina espacios vacíos o rebabas en la base del dibujo */
}

.zona-activa { 
    position: absolute;            /* Clava el recuadro de clic en coordenadas fijas */
    top: 0;                        /* Alínea el recuadro con el techo de la barra inferior */
    height: 100%;                  /* Extiende el recuadro al alto total de la barra */
}

/* Ajustes de posición horizontal para los 4 cuadrantes del menú */
.zona-inicio { left: 0%; width: 25%; }   /* Cuadrante 1: Ocupa del 0% al 25% del ancho */
.zona-oficina { left: 25%; width: 25%; }  /* Cuadrante 2: Ocupa del 25% al 50% del ancho */
.zona-marcaje { left: 50%; width: 25%; }  /* Cuadrante 3: Ocupa del 50% al 75% del ancho */
.zona-escolar { left: 75%; width: 25%; }  /* Cuadrante 4: Ocupa del 75% al 100% del ancho */

/* Restringe que los dibujos internos de los botones no deformen o desborden sus marcos */
.indice img, .ayuda img, .whatsapp img { 
    width: 100%;                   /* Fija el ancho de la imagen interna al 100% de su contenedor */
    display: block;                /* Quita rebabas e imperfecciones de alineación en el bloque */
}
</style>
</head>
